<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة حفظ الكلمات والأمثلة</title>
    <!-- استدعاء ملف البيانات المحدث C2.js بدلاً من C3 -->
    <script src="C2.js"></script>
    <style>
        :root { --primary: #4e73df; --success: #1cc88a; --info: #36b9cc; --danger: #e74a3b; --light: #f8f9fc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-stats { display: flex; justify-content: space-between; background: #e3e6f0; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; font-size: 16px; color: var(--primary); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: right; }
        th, td { padding: 12px; border: 1px solid #e3e6f0; }
        th { background-color: var(--primary); color: white; }
        tr:nth-child(even) { background-color: #f8f9fc; }
        .btn { padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 2px; }
        .btn-listen { background: var(--info); color: white; }
        .btn-mic { background: var(--success); color: white; }
        .btn-action { background: var(--primary); color: white; padding: 12px 24px; font-size: 16px; border-radius: 6px; display: block; margin: 20px auto; }
        .feedback-cell { color: #5a5c69; font-style: italic; font-size: 14px; background: #f1f3f9; padding: 8px; border-radius: 4px; display: block; margin-top: 5px; }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; background: #f8f9fc; padding: 15px; border-radius: 8px; }
        select, button { padding: 10px; border-radius: 6px; border: 1px solid #cccedb; font-size: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>💾 صفحة حفظ الكلمات والتدريب الأصيل</h2>
        <a href="index.html?screen=dashboard" style="text-decoration: none; font-weight: bold; color: var(--danger);">🔙 العودة للوحة التحكم</a>
    </div>

    <!-- العدادات العلوية المحدثة النصية -->
    <div class="header-stats">
        <span id="pages-count">الصفحات المحفوظة: 0 صفحة</span>
        <span id="words-count">إجمالي الكلمات المحفوظة: 0 كلمة</span>
    </div>

    <div class="controls">
        <label style="font-weight: bold;">اختر المستوى التعليمي:</label>
        <select id="level-select" onchange="changeLevel()">
            <option value="A1">مستوى A1</option>
            <option value="A2">مستوى A2</option>
            <option value="B1">مستوى B1</option>
            <option value="B2">مستوى B2</option>
            <option value="C1">مستوى C1</option>
            <option value="C2">مستوى C2</option>
            <option value="CLASS1">الصف الأول</option>
            <option value="CLASS2">الصف الثاني</option>
            <option value="CLASS3">الصف الثالث</option>
            <option value="CLASS4">الصف الرابع</option>
        </select>

        <label style="font-weight: bold; margin-right: 15px;">نظام عرض واستماع السلسلة:</label>
        <select id="display-mode-select" onchange="renderTable()">
            <option value="both" selected>عربي وإنجليزي معاً</option>
            <option value="ar">عربي فقط</option>
            <option value="en">إنجليزي فقط</option>
        </select>

        <button type="button" style="background: var(--danger); color: white; cursor: pointer;" onclick="resetSaveScreen()">🧹 مسح الشاشة (الوضع الافتراضي)</button>
    </div>

    <table id="words-table">
        <thead>
            <tr>
                <th style="width: 5%;">محفوظة سابقاً</th>
                <th>الكلمة والمثال والسياق التعليمي</th>
                <th style="width: 25%;">أدوات الاستماع الصوتي التفاعلي</th>
                <th style="width: 25%;">أدوات النطق والمايكروفون والتسجيل</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <!-- التوليد البرمجي عبر جافا سكريبت -->
        </tbody>
    </table>

    <button class="btn btn-action" onclick="saveWholePage()">💾 حفظ كامل الصفحة الحالية والانتقال الفوري للمجموعة التالية ➔</button>
</div>

<script>
    // مصفوفة افتراضية للمحاكاة في حال لم يجد ملف الكلمات الخارجي البيانات الكاملة
    if (typeof levelA1_Words === 'undefined') {
        window.levelA1_Words = [];
        for(let i=1; i<=100; i++) {
            levelA1_Words.push({
                id: i,
                en: "Word " + i,
                ar: "كلمة " + i,
                ex_en: "This is the educational example sentence number " + i + " for training.",
                ar_ex: "هذه هي الجملة التعليمية والمثال رقم " + i + " للتدريب والنطق.",
                pronounce: "وورد " + i,
                level: "A1"
            });
        }
    }

    let appProgress = { mainIndex: 0, activeList: [], savedWords: [], pagesCompleted: 0 };

    window.onload = function() {
        initApp();
    };

    function initApp() {
        let storedData = localStorage.getItem('appProgress');
        if (storedData) {
            appProgress = JSON.parse(storedData);
            if (!appProgress.pagesCompleted) appProgress.pagesCompleted = 0;
            if (!appProgress.savedWords) appProgress.savedWords = [];
        } else {
            appProgress = { mainIndex: 0, activeList: [], savedWords: [], pagesCompleted: 0 };
        }
        
        // حساب الـ activeList برؤية رياضية ثابتة ومباشرة بناء على عدد الصفحات لمنع تكرار الخطأ أول مرة
        let startIdx = (appProgress.pagesCompleted) * 10;
        appProgress.activeList = [];
        for (let i = 0; i < 10; i++) {
            if (startIdx + i < levelA1_Words.length) {
                appProgress.activeList.push(startIdx + i);
            }
        }
        appProgress.mainIndex = startIdx + 10;
        
        localStorage.setItem('appProgress', JSON.stringify(appProgress));
        updateTopStats();
        renderTable();
    }

    function updateTopStats() {
        document.getElementById('pages-count').innerText = `الصفحات المحفوظة: ${appProgress.pagesCompleted} صفحة`;
        document.getElementById('words-count').innerText = `إجمالي الكلمات المحفوظة: ${appProgress.savedWords.length} كلمة`;
    }

    function changeLevel() {
        appProgress.pagesCompleted = 0;
        initApp();
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = "";
        const mode = document.getElementById('display-mode-select').value;
        const currentLevel = document.getElementById('level-select').value;

        appProgress.activeList.forEach(index => {
            if (index >= levelA1_Words.length) return;
            let word = levelA1_Words[index];
            
            let isSaved = appProgress.savedWords.some(sw => sw.id === word.id && sw.level === currentLevel);
            let checkedAttr = isSaved ? "checked" : "";

            let contentHtml = "";
            if (mode === "both") {
                contentHtml = `<strong>${word.en}</strong> / <span>${word.ar}</span><br><small style="color:#555;">${word.ex_en} \ ${word.ar_ex}</small>`;
            } else if (mode === "ar") {
                contentHtml = `<span>${word.ar}</span><br><small style="color:#555;">${word.ar_ex}</small>`;
            } else if (mode === "en") {
                contentHtml = `<strong>${word.en}</strong><br><small style="color:#555;">${word.ex_en}</small>`;
            }

            // تحديد لغات القراءة والمايك حسب مصفوفة الشروط المقررة برمجياً
            let listenLang = "en-US";
            let speakLang = "en-US";
            if (mode === "ar") { listenLang = "ar-SA"; speakLang = "en-US"; }
            else if (mode === "en") { listenLang = "en-US"; speakLang = "ar-SA"; }
            else { listenLang = "en-US"; speakLang = "en-US"; }

            let listenText = (mode === "ar") ? `${word.ar} / ${word.ar_ex}` : `${word.en} / ${word.ex_en}`;
            let targetText = (speakLang === "en-US") ? word.en : word.ar;

            const row = document.createElement('tr');
            row.innerHTML = `
                <td style="text-align: center;"><input type="checkbox" class="word-checkbox" ${checkedAttr} disabled></td>
                <td>${contentHtml}</td>
                <td>
                    <button class="btn btn-listen" onclick="playAudio('${escapeRegExp(listenText)}', '${listenLang}')">🔊 استماع صوتي</button>
                </td>
                <td>
                    <button class="btn btn-mic" onclick="startMic(${word.id}, '${escapeRegExp(targetText)}', '${speakLang}')">🎙️ تسجيل ونطق</button>
                    <div id="feedback-${word.id}" class="feedback-cell">ℹ️ اضغط على أيقونة المايك وابدأ التدريب</div>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function escapeRegExp(string) {
        return string.replace(/'/g, "\\'");
    }

    function playAudio(text, lang) {
        // نطق الرموز المائلة والشرطة كـ 'أو' أو 'or' صوتياً
        let cleanText = text;
        if (lang.startsWith('ar')) {
            cleanText = cleanText.replace(/[-\/\\]/g, " أو ");
        } else {
            cleanText = cleanText.replace(/[-\/\\]/g, " or ");
        }

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = lang;
        utterance.rate = 0.9; 
        window.speechSynthesis.speak(utterance);
    }

    function startMic(wordId, correctText, speechLang) {
        const feedbackCell = document.getElementById(`feedback-${wordId}`);
        feedbackCell.innerHTML = `🎙️ جاري الاستماع بعناية... تحدث الآن`;
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            feedbackCell.innerHTML = "❌ ميزة نطق الصوت غير مدعومة في متصفحك الحالي.";
            return;
        }
        
        const recognition = new SpeechRecognition();
        recognition.lang = speechLang;
        recognition.continuous = false;
        recognition.interimResults = false; // تعطيل المعالجة الفورية المباشرة لتحسين الكفاءة 100%
        
        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            evaluatePronunciation(wordId, transcript, correctText);
        };
        
        recognition.onerror = function() {
            feedbackCell.innerHTML = "⚠️ لم يتم التقاط الصوت، اضغط المايك وحاول ثانية برفق.";
        };
        recognition.start();
    }

    function evaluatePronunciation(wordId, spokenText, targetText) {
        // معاملة همزات القطع (أ، إ، آ) كأنها ألف عادية (ا) لضمان الدقة وتفادي الأخطاء الإملائية
        let cleanTarget = targetText.toLowerCase().replace(/[أإآ]/g, "ا").replace(/[.,\/#!$%\^&\*;:{}=\-_`~()؟?]/g,"").trim();
        let cleanSpoken = spokenText.toLowerCase().replace(/[أإآ]/g, "ا").replace(/[.,\/#!$%\^&\*;:{}=\-_`~()؟?]/g,"").trim();
        
        const feedbackCell = document.getElementById(`feedback-${wordId}`);
        if (cleanTarget === cleanSpoken || cleanSpoken.includes(cleanTarget)) {
            feedbackCell.innerHTML = `<span style="color:green; font-weight:bold;">🟢 ممتاز ونطق صحيح وجيد جداً: "${spokenText}"</span>`;
        } else {
            feedbackCell.innerHTML = `<span style="color:red;">🔴 خطأ في النطق، قلت: "${spokenText}"، والمطلوب: "${targetText}"</span>`;
        }
    }

    function saveWholePage() {
        const currentLevel = document.getElementById('level-select').value;
        let today = new Date().toLocaleDateString('ar-EG');
        
        appProgress.activeList.forEach(index => {
            if (index >= levelA1_Words.length) return;
            let wordObj = levelA1_Words[index];
            if (!appProgress.savedWords.some(sw => sw.id === wordObj.id && sw.level === currentLevel)) {
                appProgress.savedWords.push({
                    id: wordObj.id, en: wordObj.en, ar: wordObj.ar, date: today, ex_en: wordObj.ex_en, ar_ex: wordObj.ar_ex, level: currentLevel
                });
            }
        });

        appProgress.pagesCompleted++;
        
        // حساب المجموعة التالية برؤية رياضية من أول نقرة دون أدنى تعليق أو تداخل عدادات
        let startIdx = (appProgress.pagesCompleted) * 10;
        appProgress.activeList = [];
        for (let i = 0; i < 10; i++) {
            if (startIdx + i < levelA1_Words.length) {
                appProgress.activeList.push(startIdx + i);
            }
        }
        appProgress.mainIndex = startIdx + 10;
        
        localStorage.setItem('appProgress', JSON.stringify(appProgress));
        alert("✅ تم حفظ الصفحة وتخزين الكلمات بنجاح والانتقال الفوري للمجموعة التالية دون تكرار.");
        updateTopStats();
        renderTable();
    }

    function resetSaveScreen() {
        document.getElementById('display-mode-select').value = "both";
        appProgress.activeList.forEach(index => {
            if (index >= levelA1_Words.length) return;
            let word = levelA1_Words[index];
            const feedbackCell = document.getElementById(`feedback-${word.id}`);
            if (feedbackCell) {
                feedbackCell.innerHTML = `ℹ️ اضغط على أيقونة المايك وابدأ التدريب`;
            }
        });
        renderTable();
        alert("🔄 تم مسح الشاشة بالكامل وإعادتها لوضع الخيارات والأنظمة الافتراضية.");
    }
</script>
</body>
</html>
