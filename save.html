<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة الحفظ والتدريب اللغوي</title>
    <style>
        :root { --primary: #4e73df; --success: #1cc88a; --danger: #e74a3b; --light: #f8f9fc; }
        body { font-family: sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .stats-bar { display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; color: var(--primary); margin-bottom: 20px; background: #eef2fa; padding: 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #e3e6f0; padding: 12px; text-align: center; }
        th { background-color: var(--primary); color: white; }
        .btn-mic { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; }
        .btn-audio { background: var(--success); color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; }
        .feedback-row { background: #fdfffe; font-size: 14px; color: #555; }
        .controls { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .btn-action { padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
        select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-size: 15px; }
    </style>
</head>
<body>

<div class="card">
    <a href="index.html?screen=dashboard" style="text-decoration: none; font-weight: bold; color: var(--primary);">🔙 العودة للوحة التحكم الرئيسية</a>
    
    <!-- تحديث نص الإحصائيات العلوي حسب الطلب تماماً -->
    <div class="stats-bar">
        <span id="pages-count">الصفحات المحفوظة: 0 صفحة</span>
        <span id="words-count">إجمالي الكلمات المحفوظة: 0 كلمة</span>
    </div>

    <h3>⚙️ إعدادات عرض واجهة الحفظ الحالية</h3>
    <div class="controls">
        <label>اختر لغة الواجهة والتدريب:</label>
        <select id="display-mode-select" onchange="renderTable()">
            <option value="both" selected>عربي وإنجليزي معاً</option>
            <option value="ar">عربي فقط</option>
            <option value="en">إنجليزي فقط</option>
        </select>
        
        <label>المستوى الدراسي الحالي:</label>
        <select id="level-select" onchange="changeLevel()">
            <option value="A1">مستوى A1</option>
            <option value="A2">مستوى A2</option>
            <option value="B1">مستوى B1</option>
            <option value="B2">مستوى B2</option>
            <option value="C1">مستوى C1</option>
            <option value="C2">مستوى C2</option>
            <option value="CLASS1">الصف الأول</option>
            <option value="CLASS2">الصف الثاني</option>
        </select>

        <button class="btn-action" style="background: #e74a3b;" onclick="resetSaveScreen()">🧹 مسح الشاشة (الوضع الافتراضي)</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>إجراءات التدريب الصوتية</th>
                <th>الكلمة / الجملة والمثال التعليمي</th>
                <th>محفوظة سابقاً</th>
            </tr>
        </thead>
        <tbody id="words-table-body">
            <!-- يتم توليد الصفوف عبر الجافاسكربت ديناميكياً -->
        </tbody>
    </table>

    <div class="controls" style="margin-top: 25px;">
        <button class="btn-action" style="background: var(--success); font-size:18px; padding: 12px 30px;" onclick="saveWholePage()">💾 حفظ الصفحة والانتقال الفوري للفوج التالي</button>
    </div>
</div>

<script src="C2.js"></script>
<script>
    // مصفوفة افتراضية متكاملة للمحاكاة والربط
    let levelA1_Words = [];
    for(let i=1; i<=40; i++) {
        levelA1_Words.push({
            id: i,
            en: `Word ${i}`,
            ar: `كلمة ${i}`,
            ex_en: `This is example number ${i} / representing modern slash learning.`,
            ar_ex: `هذا هو المثال رقم ${i} \\ يمثل نظام تدريبي متطور لشاشات العرض.`
        });
    }

    let appProgress;

    function initApp() {
        let storedData = localStorage.getItem('appProgress');
        appProgress = storedData ? JSON.parse(storedData) : null;

        if(!appProgress) {
            appProgress = { mainIndex: 0, activeList: [], savedWords: [], pagesCompleted: 0 };
        }
        
        // حساب الـ activeList مباشرة برياضيات دقيقة لضمان تفادي تعليق النقرة الأولى
        let startIdx = (appProgress.pagesCompleted || 0) * 10;
        appProgress.activeList = [];
        for(let i = 0; i < 10; i++) {
            if(startIdx + i < levelA1_Words.length) {
                appProgress.activeList.push(startIdx + i);
            }
        }
        appProgress.mainIndex = startIdx + 10;
        
        localStorage.setItem('appProgress', JSON.stringify(appProgress));
        updateTopStats();
        renderTable();
    }

    function updateTopStats() {
        document.getElementById('pages-count').innerText = `الصفحات المحفوظة: ${appProgress.pagesCompleted || 0} صفحة`;
        document.getElementById('words-count').innerText = `إجمالي الكلمات المحفوظة: ${(appProgress.pagesCompleted || 0) * 10} كلمة`;
    }

    function changeLevel() {
        alert("تم تبديل تصنيف الصف الدراسي بنجاح وجاري استدعاء البيانات المتوافقة.");
    }

    function renderTable() {
        const tbody = document.getElementById('words-table-body');
        tbody.innerHTML = "";
        let mode = document.getElementById('display-mode-select').value;

        // تحديد اللغات الصوتية والتدريبية بناء على مصفوفة متطلبات الخيارات 8 إلى 13
        let listenLang = "en-US";
        let speakLang = "en-US";

        if (mode === "ar") { listenLang = "ar-SA"; speakLang = "en-US"; }
        else if (mode === "en") { listenLang = "en-US"; speakLang = "ar-SA"; }
        else { listenLang = "en-US"; speakLang = "en-US"; }

        appProgress.activeList.forEach(index => {
            if(index >= levelA1_Words.length) return;
            let word = levelA1_Words[index];
            
            // تخصيص النص المراد عرضه حسب الاختيار الفعلي للواجهة
            let displayText = "";
            if (mode === "ar") {
                displayText = `<div><strong>الكلمة:</strong> ${word.ar}</div><div style="margin-top:5px;"><strong>المثال:</strong> ${word.ar_ex}</div>`;
            } else if (mode === "en") {
                displayText = `<div><strong>Word:</strong> ${word.en}</div><div style="margin-top:5px;"><strong>Example:</strong> ${word.ex_en}</div>`;
            } else {
                displayText = `<div><strong>${word.en}</strong> = ${word.ar}</div>
                               <div style="margin-top:6px; color:#666; font-size:14px;">M: ${word.ex_en}</div>
                               <div style="color:#666; font-size:14px;">ع: ${word.ar_ex}</div>`;
            }

            // توليد الصفوف متضمنة استرجاع الـ Checkbox بالكامل (الخيار 6) وبناء الصف الثالث للتقييم الصوتى المباشر
            let targetTextToEvaluate = (mode === "ar") ? word.ar : word.en;

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>
                    <button class="btn-audio" onclick="playAudio('${mode === "ar" ? word.ar : word.en}', '${listenLang}')">🔊 استماع</button>
                    <button class="btn-mic" onclick="startMic(${word.id}, '${targetTextToEvaluate}', '${speakLang}')">🎙️ مايك</button>
                </td>
                <td style="text-align: right;">${displayText}</td>
                <td><input type="checkbox" class="word-checkbox" checked></td>
            `;
            tbody.appendChild(row);

            const feedbackRow = document.createElement('tr');
            feedbackRow.className = "feedback-row";
            feedbackRow.innerHTML = `<td colspan="3" id="feedback-${word.id}" style="text-align: right; background: #fafbfc; color:#858796;">ℹ️ اضغط على أيقونة المايك وابدأ التدريب ونطق الكلمات...</td>`;
            tbody.appendChild(feedbackRow);
        });
    }

    // منطق نطق الرموز المائلة والشرطات كـ 'أو' بالعربي و 'or' بالإنجليزي (الخيار 7)
    function playAudio(text, lang) {
        let processedText = text;
        if (lang.startsWith('ar')) {
            processedText = processedText.replace(/[-\/\\]/g, " أو ");
        } else {
            processedText = processedText.replace(/[-\/\\]/g, " or ");
        }
        const utterance = new SpeechSynthesisUtterance(processedText);
        utterance.lang = lang;
        window.speechSynthesis.speak(utterance);
    }

    // المايكروفونات المحسنة الكفاءة تماماً دون معالجة وتداخل النصوص المؤقتة المسببة للتوقف الفجائي (الخيار 29)
    function startMic(wordId, correctText, speechLang) {
        const feedbackCell = document.getElementById(`feedback-${wordId}`);
        feedbackCell.innerHTML = `🎙️ جاري الاستماع الفعلي لنطقك... تحدث الآن بوضوح`;
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SpeechRecognition) {
            feedbackCell.innerHTML = "❌ ميزة التعرف على الصوت غير مدعومة في متصفحك الحالي.";
            return;
        }
        
        const recognition = new SpeechRecognition();
        recognition.lang = speechLang;
        recognition.continuous = false;
        recognition.interimResults = false; // إلغاء التحديث الفوري لمنع الإجهاد البرمجي والتجميد
        
        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            evaluatePronunciation(wordId, transcript, correctText);
        };
        
        recognition.onerror = function() {
            feedbackCell.innerHTML = "⚠️ لم يتم التقاط الصوت بوضوح تام، يرجى الضغط مرة أخرى وإعادة المحاولة.";
        };
        recognition.start();
    }

    // مطابقة النطق مع تسوية وتحويل همزات القطع (أ، إ، آ) إلى ألف عادية (ا) لضمان دقة المطابقة (الخيار 1)
    function evaluatePronunciation(wordId, spokenText, targetText) {
        const normalize = (txt) => {
            return txt.toLowerCase()
                .replace(/[أإآ]/g, "ا")
                .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()؟?]/g,"")
                .replace(/\s+/g," ").trim();
        };

        let cleanSpoken = normalize(spokenText);
        let cleanTarget = normalize(targetText);
        const feedbackCell = document.getElementById(`feedback-${wordId}`);

        if(cleanSpoken === cleanTarget) {
            feedbackCell.innerHTML = `<span style="color: var(--success); font-weight:bold;">✅ نطق ممتاز ومطابق تماماً! الكلمة المنطوقة: (${spokenText})</span>`;
        } else {
            feedbackCell.innerHTML = `<span style="color: var(--danger);">❌ نطق غير مطابق، حاولت قراءة: (${spokenText}) - المستهدف الصحيح: (${targetText})</span>`;
        }
    }

    function saveWholePage() {
        let today = new Date().toLocaleDateString('ar-EG');
        appProgress.activeList.forEach(index => {
            let wordObj = levelA1_Words[index];
            if(!appProgress.savedWords.some(sw => sw.id === wordObj.id)) {
                appProgress.savedWords.push({
                    id: wordObj.id, en: wordObj.en, ar: wordObj.ar, date: today, level: document.getElementById('level-select').value
                });
            }
        });

        appProgress.pagesCompleted++;
        
        // حساب النطاق الفوجي التالي فوراً وبنقرة واحدة صحيحة تمنع تباين العدادات
        let startIdx = appProgress.pagesCompleted * 10;
        appProgress.activeList = [];
        for(let i = 0; i < 10; i++) {
            if(startIdx + i < levelA1_Words.length) {
                appProgress.activeList.push(startIdx + i);
            }
        }
        appProgress.mainIndex = startIdx + 10;
        
        localStorage.setItem('appProgress', JSON.stringify(appProgress));
        alert("✅ تم حفظ كلمات الصفحة الحالية في ملف تقدم الطالب بنجاح والانتقال التلقائي للفوج التالي.");
        updateTopStats();
        renderTable();
    }

    // مسح الشاشة للوضع الافتراضي ومسح الصف الثالث التقييمي (الخيار 14)
    function resetSaveScreen() {
        document.getElementById('display-mode-select').value = "both";
        appProgress.activeList.forEach(index => {
            if(index >= levelA1_Words.length) return;
            let word = levelA1_Words[index];
            const feedbackCell = document.getElementById(`feedback-${word.id}`);
            if(feedbackCell) {
                feedbackCell.innerHTML = `ℹ️ اضغط على أيقونة المايك وابدأ التدريب ونطق الكلمات...`;
            }
        });
        renderTable();
        alert("🔄 تم إعادة ضبط الشاشة والخيارات للحالة الافتراضية بنجاح.");
    }

    window.onload = initApp;
</script>
</body>
</html>
