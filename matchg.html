<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة المطابقة والذاكرة</title>
    
    <script src="A1.js"></script><script src="A2.js"></script><script src="B1.js"></script><script src="B2.js"></script>
    <script src="C1.js"></script><script src="C2.js"></script>
    <script src="CLASS1.js"></script><script src="CLASS2.js"></script><script src="CLASS3.js"></script>
    <script src="CLASS4.js"></script><script src="CLASS5.js"></script><script src="CLASS6.js"></script>
    <script src="CLASS7.js"></script><script src="CLASS8.js"></script><script src="CLASS9.js"></script>
    <script src="CLASS10.js"></script><script src="CLASS11.js"></script><script src="CLASS12.js"></script>
    
    <style>
        :root { --primary: #4e73df; --success: #1cc88a; --warning: #f6c23e; --danger: #e74a3b; --info: #36b9cc; --dark: #5a5c69; --light: #f8f9fc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #eef2f7; padding: 20px; margin: 0; text-align: center; }
        h1 { color: var(--primary); margin-bottom: 10px; }
        
        /* واجهة الإحصائيات واختيار المستوى */
        .header-stats { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; font-size: 18px; font-weight: bold; flex-wrap: wrap; gap: 15px;}
        .score-text { color: var(--warning); font-size: 20px;}
        .level-selector select { padding: 10px; font-size: 16px; border-radius: 5px; border: 2px solid var(--primary); cursor: pointer; font-family: inherit; min-width: 200px; font-weight: bold;}
        
        /* واجهة المراحل */
        #stages-screen { display: block; }
        .stages-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-top: 20px; max-width: 1100px; margin-left: auto; margin-right: auto;}
        .stage-btn { padding: 15px 25px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; background: var(--primary); color: white; transition: 0.2s; position: relative; min-width: 120px; font-weight: bold;}
        .stage-btn:hover { opacity: 0.9; transform: translateY(-3px); }
        .stage-btn.locked { background: #cbd5e1; color: #64748b; cursor: not-allowed; transform: none; }
        .stage-stars { font-size: 14px; margin-top: 5px; color: #f1c40f; display: block; letter-spacing: 2px;}
        
        /* أدوات تصفير النقاط */
        .admin-controls { margin-top: 50px; padding: 20px; background: #fff; border-radius: 10px; border: 1px solid #ddd; display: inline-block; box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
        .admin-controls input { padding: 8px; font-size: 16px; margin-left: 10px; border: 1px solid #ccc; border-radius: 5px; text-align: left; direction: ltr;}
        .admin-controls button { padding: 8px 15px; background: var(--danger); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;}
        .admin-controls button:hover { opacity: 0.9; }

        /* واجهة اللعب */
        #game-screen { display: none; }
        .game-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #fff; padding: 15px 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 1100px; margin-left: auto; margin-right: auto;}
        .timer { font-size: 24px; color: var(--danger); font-weight: bold; }
        .board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; max-width: 1100px; margin: 0 auto; }
        .card { background: #fff; border: 3px solid #cbd5e1; border-radius: 10px; padding: 20px 10px; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.2s; user-select: none; display: flex; align-items: center; justify-content: center; min-height: 80px; color: var(--dark);}
        .card:hover { border-color: var(--primary); }
        .card.selected { background: #e3f2fd; border-color: var(--info); transform: scale(1.05); }
        .card.matched { visibility: hidden; opacity: 0; transition: visibility 0s 0.3s, opacity 0.3s linear;}

        .btn-back { background: var(--dark); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold;}
        .btn-back:hover { opacity: 0.9; }
        
        /* نافذة النتيجة */
        #result-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2);}
        .modal-content h2 { margin-top: 0; color: var(--primary);}
        .stars-display { font-size: 40px; color: #f1c40f; margin: 15px 0; letter-spacing: 5px;}
        .modal-btn { background: var(--success); color: white; border: none; padding: 10px 25px; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 15px; font-weight: bold;}
        .modal-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="header-stats">
        <div class="level-selector">
            <label for="level-select">اختر المستوى المكتمل للعب: </label>
            <select id="level-select" onchange="onLevelChange()">
                </select>
        </div>
        <div class="score-text">النقاط التراكمية المشتركة: <span id="total-score">0</span> 🏆</div>
    </div>

    <div id="stages-screen">
        <h1>لعبة الذاكرة والمطابقة 🎴</h1>
        <p style="color: var(--dark); font-size: 18px; font-weight: bold;">اختر المرحلة لتبدأ التحدي. طابق الكلمة مع معناها بأسرع وقت لجمع النجوم والنقاط!</p>
        <div class="stages-grid" id="stages-container"></div>

        <div class="admin-controls">
            <h3 style="color: var(--dark); margin-top: 0;">تصفير المراحل والنجوم للمستوى المحدد (لولي الأمر)</h3>
            <input type="password" id="reset-password" placeholder="أدخل كلمة المرور">
            <button onclick="resetProgress()">تصفير الآن</button>
        </div>
        <br>
        <button class="btn-back" style="margin-top: 30px; padding: 12px 30px;" onclick="window.location.href='game.html'">🔙 العودة لصفحة الألعاب</button>
    </div>

    <div id="game-screen">
        <div class="game-controls">
            <button class="btn-back" onclick="showStagesScreen()">🔙 خروج من المرحلة</button>
            <h2 style="margin: 0; color: var(--primary);">المرحلة: <span id="current-stage-display">1</span></h2>
            <div class="timer">
                الوقت: <span id="timer-display">0</span> ثانية ⏱️
                <span id="live-stars" style="color: #f1c40f; font-size: 20px; margin-right: 15px; letter-spacing: 2px;">★★★★★</span>
            </div>
        </div>
        <div class="board" id="game-board"></div>
    </div>

    <div id="result-modal">
        <div class="modal-content">
            <h2 id="modal-title">أحسنت! أنهيت المرحلة 🎉</h2>
            <div class="stars-display" id="modal-stars">⭐⭐⭐</div>
            <p style="font-size: 18px; color: var(--dark);">وقت الإجابة: <strong id="modal-time" style="color: var(--danger);"></strong> ثانية</p>
            <p id="modal-points-msg" style="color: var(--success); font-weight: bold; font-size: 18px;"></p>
            <button class="modal-btn" onclick="showStagesScreen()">متابعة</button>
        </div>
    </div>

<script>
    // --- 1. قاموس البيانات الأساسي ---
    const allLevelsData = {
        "A1": typeof levelA1_Words !== 'undefined' ? levelA1_Words : [], "A2": typeof levelA2_Words !== 'undefined' ? levelA2_Words : [],
        "B1": typeof levelB1_Words !== 'undefined' ? levelB1_Words : [], "B2": typeof levelB2_Words !== 'undefined' ? levelB2_Words : [],
        "C1": typeof levelC1_Words !== 'undefined' ? levelC1_Words : [], "C2": typeof levelC2_Words !== 'undefined' ? levelC2_Words : [],
        "CLASS1": typeof levelCLASS1_Words !== 'undefined' ? levelCLASS1_Words : [], "CLASS2": typeof levelCLASS2_Words !== 'undefined' ? levelCLASS2_Words : [],
        "CLASS3": typeof levelCLASS3_Words !== 'undefined' ? levelCLASS3_Words : [], "CLASS4": typeof levelCLASS4_Words !== 'undefined' ? levelCLASS4_Words : [],
        "CLASS5": typeof levelCLASS5_Words !== 'undefined' ? levelCLASS5_Words : [], "CLASS6": typeof levelCLASS6_Words !== 'undefined' ? levelCLASS6_Words : [],
        "CLASS7": typeof levelCLASS7_Words !== 'undefined' ? levelCLASS7_Words : [], "CLASS8": typeof levelCLASS8_Words !== 'undefined' ? levelCLASS8_Words : [],
        "CLASS9": typeof levelCLASS9_Words !== 'undefined' ? levelCLASS9_Words : [], "CLASS10": typeof levelCLASS10_Words !== 'undefined' ? levelCLASS10_Words : [],
        "CLASS11": typeof levelCLASS11_Words !== 'undefined' ? levelCLASS11_Words : [], "CLASS12": typeof levelCLASS12_Words !== 'undefined' ? levelCLASS12_Words : []
    };

    function getLevelName(code) {
        if(code.startsWith('CLASS')) {
            let num = code.replace('CLASS', '');
            let ordinals = {'1':'الأول','2':'الثاني','3':'الثالث','4':'الرابع','5':'الخامس','6':'السادس','7':'السابع','8':'الثامن','9':'التاسع','10':'العاشر','11':'الحادي عشر','12':'الثاني عشر'};
            return 'الصف ' + (ordinals[num] || num);
        }
        return 'مستوى ' + code;
    }

    // --- 2. المتغيرات العامة ---
    let appProgress = JSON.parse(localStorage.getItem('appProgress')) || { cumulativeScore: 0, levels: {} };
    let gameProgress = JSON.parse(localStorage.getItem('matchGameProgress')) || {};
    let currentLevel = "";
    let wordsData = [];
    const WORDS_PER_STAGE = 10;
    let totalStages = 0;
    
    let currentStage = 1;
    let timerInterval;
    let secondsElapsed = 0;
    let selectedCards = [];
    let matchesFound = 0;

    // --- 3. التشغيل الأولي وبناء القائمة المنسدلة ---
    window.onload = function() {
        document.getElementById('total-score').innerText = Math.round(appProgress.cumulativeScore || 0);
        initializeDropdown();
    };

    function initializeDropdown() {
        const selectElement = document.getElementById('level-select');
        selectElement.innerHTML = ''; 
        let hasCompletedLevels = false;

        // البحث داخل مستويات appProgress لتحديد المكتملة فقط
        for(let lvl in appProgress.levels) {
            let lData = appProgress.levels[lvl];
            let db = allLevelsData[lvl] || [];
            
            // تم تغيير الشرط هنا لحل مشكلة الـ ID المكرر في B1 وأي ملف آخر
            // نعتمد على مؤشر الوصول (mainIndex) وفراغ صفحة الحفظ (activeList)
            let isLevelFinished = (db.length > 0) && 
                                  (lData.mainIndex >= db.length) && 
                                  (!lData.activeList || lData.activeList.length === 0) && 
                                  (lData.savedWords && lData.savedWords.length > 0);

            if (isLevelFinished) {
                let option = document.createElement('option');
                option.value = lvl;
                option.textContent = getLevelName(lvl);
                selectElement.appendChild(option);
                hasCompletedLevels = true;
            }
        }

        if (!hasCompletedLevels) {
            selectElement.innerHTML = '<option value="">لا يوجد مستويات مكتملة</option>';
            document.getElementById('stages-container').innerHTML = '<p style="color:var(--danger); font-size:20px; font-weight:bold;">يجب عليك إتمام حفظ كلمات مستوى واحد أو صف واحد بالكامل في الحفظ اليومي لتتمكن من اللعب فيه.</p>';
            selectElement.disabled = true;
            return;
        }

        currentLevel = selectElement.value;
        loadGameData();
    }

    function onLevelChange() {
        currentLevel = document.getElementById('level-select').value;
        loadGameData();
    }

    // --- 4. تجهيز بيانات اللعبة وعرض المراحل ---
    function loadGameData() {
        wordsData = allLevelsData[currentLevel] || [];
        if(wordsData.length === 0) return;

        totalStages = Math.ceil(wordsData.length / WORDS_PER_STAGE);
        
        // تهيئة سجل اللعبة لهذا المستوى إن لم يكن موجوداً
        if(!gameProgress[currentLevel]) {
            gameProgress[currentLevel] = { 1: { unlocked: true, stars: 0, time: 0 } };
        }
        
        renderStages();
    }

    function renderStages() {
        const container = document.getElementById('stages-container');
        container.innerHTML = '';
        let levelData = gameProgress[currentLevel];

        for(let i = 1; i <= totalStages; i++) {
            let btn = document.createElement('button');
            btn.className = 'stage-btn';
            
            let isUnlocked = levelData[i] && levelData[i].unlocked;
            if(i === 1) isUnlocked = true; 

            if(!isUnlocked) {
                btn.classList.add('locked');
                btn.innerHTML = `مرحلة ${i} 🔒<br><span class="stage-stars" style="color:#94a3b8;">☆☆☆☆☆</span>`;
            } else {
                let starsCount = levelData[i]?.stars || 0;
                let timeSpent = levelData[i]?.time ? ` | ${levelData[i].time}ث` : '';
                let starsHTML = '★'.repeat(starsCount) + '☆'.repeat(5 - starsCount);
                
                btn.innerHTML = `مرحلة ${i} <br><span class="stage-stars">${starsHTML} <span style="color:#fff; font-size:12px;">${timeSpent}</span></span>`;
                btn.onclick = () => startGame(i);
            }
            container.appendChild(btn);
        }
        document.getElementById('total-score').innerText = Math.round(appProgress.cumulativeScore || 0);
    }

    // --- 5. بدء المرحلة وبناء البطاقات ---
    function startGame(stageNumber) {
        currentStage = stageNumber;
        document.getElementById('stages-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('current-stage-display').innerText = stageNumber;
        
        let startIndex = (stageNumber - 1) * WORDS_PER_STAGE;
        let endIndex = startIndex + WORDS_PER_STAGE;
        let stageWords = wordsData.slice(startIndex, endIndex);

        // إكمال المرحلة الأخيرة بكلمات سابقة إذا كان عددها أقل من 10
        if(stageWords.length < WORDS_PER_STAGE && wordsData.length >= WORDS_PER_STAGE) {
            let needed = WORDS_PER_STAGE - stageWords.length;
            let previousWords = wordsData.slice(0, startIndex);
            // خلط الكلمات السابقة عشوائياً لأخذ كلمات مختلفة كل مرة
            previousWords.sort(() => Math.random() - 0.5);
            let extraWords = previousWords.slice(0, needed); 
            stageWords = stageWords.concat(extraWords);
        }

        renderBoard(stageWords);
        startTimer();
    }

    function renderBoard(stageWords) {
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        selectedCards = [];
        matchesFound = 0;

        let cardsArray = [];
        stageWords.forEach((item) => {
            // إضافة الكلمة بالانجليزي والعربي من هيكلية البيانات الخاصة بك
            cardsArray.push({ id: item.id, text: item.en, type: 'en', lang: 'ltr' });
            cardsArray.push({ id: item.id, text: item.ar, type: 'ar', lang: 'rtl' });
        });

        // خلط جميع البطاقات (20 بطاقة) عشوائياً
        cardsArray.sort(() => Math.random() - 0.5);

        cardsArray.forEach(item => {
            let cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            cardDiv.innerText = item.text;
            cardDiv.dataset.id = item.id;
            cardDiv.dataset.type = item.type;
            cardDiv.dir = item.lang; 
            
            cardDiv.onclick = () => onCardClick(cardDiv);
            board.appendChild(cardDiv);
        });
    }

    // --- 6. منطق النقر والمطابقة ---
    function onCardClick(card) {
        if(selectedCards.length >= 2 || card.classList.contains('selected') || card.classList.contains('matched')) return;

        card.classList.add('selected');
        selectedCards.push(card);

        if(selectedCards.length === 2) {
            checkMatch();
        }
    }

    function checkMatch() {
        let card1 = selectedCards[0];
        let card2 = selectedCards[1];

        // المطابقة: نفس الـ id ومختلفين في النوع (عربي/انجليزي)
        if(card1.dataset.id === card2.dataset.id && card1.dataset.type !== card2.dataset.type) {
            setTimeout(() => {
                card1.classList.remove('selected');
                card1.classList.add('matched');
                card2.classList.remove('selected');
                card2.classList.add('matched');
                selectedCards = [];
                matchesFound++;
                if(matchesFound === WORDS_PER_STAGE) {
                    endGame();
                }
            }, 400);
        } else {
            setTimeout(() => {
                card1.classList.remove('selected');
                card2.classList.remove('selected');
                selectedCards = [];
            }, 800);
        }
    }

    // --- 7. منطق الوقت، النجوم والنقاط التراكمية المشتركة ---
    function updateLiveStars(time) {
        let currentStars = 0;
        if(time <= 60) currentStars = 5;
        else if(time <= 70) currentStars = 4;
        else if(time <= 100) currentStars = 3;
        else if(time <= 140) currentStars = 2;
        else if(time <= 180) currentStars = 1;
        else currentStars = 0;
        
        document.getElementById('live-stars').innerText = '★'.repeat(currentStars) + '☆'.repeat(5 - currentStars);
    }

    function startTimer() {
        secondsElapsed = 0;
        document.getElementById('timer-display').innerText = secondsElapsed;
        document.getElementById('live-stars').innerText = '★★★★★'; // إضاءة الخمس نجوم مع بداية التحدي
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            secondsElapsed++;
            document.getElementById('timer-display').innerText = secondsElapsed;
            updateLiveStars(secondsElapsed); // تحديث النجوم بشكل حي
        }, 1000);
    }

    function endGame() {
        clearInterval(timerInterval);
        let time = secondsElapsed;
        let stars = 0;

        // احتساب النجوم وفقاً للجدول الزمني الجديد
        if(time <= 60) stars = 5;
        else if(time <= 70) stars = 4;
        else if(time <= 100) stars = 3;
        else if(time <= 140) stars = 2;
        else if(time <= 180) stars = 1;
        else stars = 0;

        let levelData = gameProgress[currentLevel];
        let previousStars = levelData[currentStage]?.stars || 0;
        let pointsGained = 0;

        // إعطاء النقاط فقط لفارق النجوم الجديد وحفظها في التخزين التراكمي للتطبيق
        if(stars > previousStars) {
            pointsGained = (stars - previousStars) * 5;
            appProgress.cumulativeScore = (appProgress.cumulativeScore || 0) + pointsGained;
            localStorage.setItem('appProgress', JSON.stringify(appProgress)); // حفظ النقاط للتطبيق الأم
            document.getElementById('total-score').innerText = Math.round(appProgress.cumulativeScore);
            
            levelData[currentStage] = {
                unlocked: true,
                stars: stars,
                time: time // تحديث الوقت بأفضل وقت جديد
            };
        } else if (!levelData[currentStage]) {
            levelData[currentStage] = { unlocked: true, stars: stars, time: time };
        }

        // فتح المرحلة التالية إذا لم نصل للنهاية
        if(currentStage < totalStages) {
            levelData[currentStage + 1] = levelData[currentStage + 1] || { unlocked: true, stars: 0 };
        }

        gameProgress[currentLevel] = levelData;
        localStorage.setItem('matchGameProgress', JSON.stringify(gameProgress));

        showResultModal(stars, time, pointsGained);
    }

    // --- 8. النوافذ والانتقالات ---
    function showResultModal(stars, time, points) {
        document.getElementById('modal-stars').innerText = '★'.repeat(stars) + '☆'.repeat(5 - Math.max(0, stars));
        document.getElementById('modal-time').innerText = time;
        
        let msgElement = document.getElementById('modal-points-msg');
        if(points > 0) {
            msgElement.innerText = `رائع! كسبت ${points} نقطة إضافية للعلامة التراكمية! 🏆`;
        } else {
            msgElement.innerText = `لم تحصل على نقاط جديدة. حاول بوقت أسرع لرفع نجومك! 💪`;
        }
        
        document.getElementById('result-modal').style.display = 'flex';
    }

    function showStagesScreen() {
        clearInterval(timerInterval);
        document.getElementById('result-modal').style.display = 'none';
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('stages-screen').style.display = 'block';
        renderStages();
    }

    // --- 9. زر التصفير لولي الأمر ---
    function resetProgress() {
        let passInput = document.getElementById('reset-password').value;
        if(passInput === 'T@mer2023') { 
            if(!currentLevel) return;
            // تصفير مراحل اللعبة للمستوى المختار فقط
            gameProgress[currentLevel] = { 1: { unlocked: true, stars: 0, time: 0 } };
            localStorage.setItem('matchGameProgress', JSON.stringify(gameProgress));
            document.getElementById('reset-password').value = '';
            alert(`تم تصفير جميع المراحل والنجوم لمستوى (${getLevelName(currentLevel)}) بنجاح وإغلاقها ما عدا المرحلة الأولى.`);
            renderStages();
        } else {
            alert('كلمة المرور غير صحيحة!');
        }
    }
</script>

</body>
</html>
