<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة المطابقة والذاكرة</title>
	<script>
    (function checkActivation() {
        if (!localStorage.getItem('app_is_activated')) {
            alert("عذراً، يجب تفعيل النسخة أولاً من الشاشة الرئيسية!");
            window.location.replace("index.html"); 
        }
    })();
</script>
    <script src="A1.js"></script><script src="A2.js"></script><script src="B1.js"></script><script src="B2.js"></script>
    <script src="C1.js"></script><script src="C2.js"></script>
    <script src="CLASS1.js"></script><script src="CLASS2.js"></script><script src="CLASS3.js"></script>
    <script src="CLASS4.js"></script><script src="CLASS5.js"></script><script src="CLASS6.js"></script>
    <script src="CLASS7.js"></script><script src="CLASS8.js"></script><script src="CLASS9.js"></script>
    <script src="CLASS10.js"></script><script src="CLASS11.js"></script><script src="CLASS12.js"></script>
    
    <style>
        :root { --primary: #4e73df; --success: #1cc88a; --warning: #f6c23e; --danger: #e74a3b; --info: #36b9cc; --dark: #5a5c69; --light: #f8f9fc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #eef2f7; padding: 20px; margin: 0; text-align: center; overflow-x: hidden; }
        h1 { color: var(--primary); margin-bottom: 10px; margin-top: 20px;}
        .left-header-group { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .icon-btn { background: none; border: none; font-size: 32px; cursor: pointer; transition: transform 0.3s; user-select: none; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); text-decoration: none; display: flex; justify-content: center; align-items: center;}
        .icon-btn:hover { transform: scale(1.1); }
        .header-stats { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; font-size: 18px; font-weight: bold; flex-wrap: wrap; gap: 15px;}
        .score-text { color: var(--warning); font-size: 20px;}
        .level-selector select { padding: 10px; font-size: 16px; border-radius: 5px; border: 2px solid var(--primary); cursor: pointer; font-family: inherit; min-width: 200px; font-weight: bold;}
        #stages-screen { display: block; }
        .stages-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-top: 20px; max-width: 1100px; margin-left: auto; margin-right: auto;}
        
        .stage-btn { padding: 15px 25px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; background: var(--primary); color: white; transition: 0.2s; position: relative; min-width: 120px; font-weight: bold;}
        .stage-btn:hover { opacity: 0.9; transform: translateY(-3px); }
        .stage-btn.locked { background: #cbd5e1; color: #64748b; cursor: not-allowed; transform: none; }
        .stage-stars { font-size: 14px; margin-top: 5px; color: #f1c40f; display: block; letter-spacing: 2px;}

        /* تنسيق المراحل النارية */
        .hot-stage { background: linear-gradient(45deg, #e74a3b, #f6c23e) !important; color: white !important; animation: pulseHot 1.5s infinite; border: 2px solid #fff;}
        @keyframes pulseHot { 
            0% {box-shadow: 0 0 0 0 rgba(231, 74, 59, 0.7);} 
            70% {box-shadow: 0 0 0 10px rgba(231, 74, 59, 0);} 
            100% {box-shadow: 0 0 0 0 rgba(231, 74, 59, 0);} 
        }
        .hot-badge { font-size:12px; color:#ffeb3b; background:rgba(0,0,0,0.5); padding:2px 5px; border-radius:4px; margin-right: 5px; }

        .custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 2000; }
        .modal-content-box { background: #fff; width: 95%; max-width: 500px; padding: 25px; border-radius: 15px; text-align: right; position: relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); direction: rtl;}
        .btn-close-modal { position: absolute; top: 15px; left: 15px; background: var(--danger); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; font-weight: bold; font-size: 18px; cursor: pointer; z-index: 10; }
        .btn-close-modal:hover { opacity: 0.8; }
        .modal-content-box h3 { color: var(--primary); margin-top: 0; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px;}
        .settings-row { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;}
        .settings-row label { font-weight: bold; min-width: 150px; color: var(--dark);}
        .settings-row input[type="number"] { padding: 8px; width: 80px; border: 1px solid #ccc; border-radius: 5px; font-weight: bold; text-align: center;}
        .action-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 25px; justify-content: center;}
        .action-btns button { padding: 10px 20px; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 15px; flex-grow: 1;}
        .btn-save { background: var(--success); }

        #game-screen { display: none; }
        .game-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #fff; padding: 15px 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 1100px; margin-left: auto; margin-right: auto; flex-wrap: wrap; gap: 10px;}
        .timer { font-size: clamp(16px, 3vw, 24px); color: var(--danger); font-weight: bold; }
        .board { display: grid; grid-template-columns: repeat(5, 1fr); gap: clamp(8px, 1.5vw, 15px); max-width: 1100px; margin: 0 auto; padding: 5px; }
        @media (max-width: 768px) { .board { grid-template-columns: repeat(4, 1fr); } }
        .card { background: #fff; border: clamp(2px, 0.5vw, 3px) solid #cbd5e1; border-radius: clamp(8px, 2vw, 12px); padding: clamp(5px, 1.5vw, 20px) clamp(2px, 1vw, 10px); font-size: clamp(12px, 3.5vw, 22px); font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.2s; user-select: none; display: flex; align-items: center; justify-content: center; min-height: clamp(55px, 12vw, 90px); color: var(--dark); text-align: center; line-height: 1.2; word-wrap: break-word; }
        .card:hover { border-color: var(--primary); background: #f8f9fc; transform: scale(1.02); }
        .card.selected { background: var(--warning); color: #fff; border-color: var(--warning); }
        .card.matched { background: var(--success); color: #fff; border-color: var(--success); cursor: default; transform: scale(0.95); opacity: 0; pointer-events: none;}
        
        #result-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 2500; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.2);}
        .modal-content h2 { margin-top: 0; color: var(--primary);}
        .stars-display { font-size: clamp(25px, 5vw, 40px); color: #f1c40f; margin: 15px 0; letter-spacing: 5px;}
        .modal-btn { background: var(--success); color: white; border: none; padding: 10px 25px; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 15px; font-weight: bold;}
        .modal-btn:hover { opacity: 0.9; }

        @keyframes pulseEvent { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } 100% { transform: translateX(-50%) scale(1); } }
        #event-active-banner { display: none; position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: #1cc88a; color: white; padding: 8px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; z-index: 9999; box-shadow: 0 4px 10px rgba(0,0,0,0.2); animation: pulseEvent 2s infinite; border: 2px solid #fff; font-size: 14px; }
        #parent-mode-banner { display: none; position: absolute; top: 15px; right: 20px; background: #f6c23e; color: #333; padding: 5px 15px; border-radius: 15px; font-weight: bold; z-index: 9999; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 2px solid #fff; font-size: 14px; }
    </style>
</head>
<body>

    <div id="parent-mode-banner">وضع ولي الأمر 🛡️</div>
    <div id="event-active-banner" onclick="showEventDetails()">🌟 حدث مضاعفة النقاط نشط!</div>

    <div class="header-stats">
        <div class="level-selector">
            <label for="level-select">اختر المستوى للعب: </label>
            <select id="level-select" onchange="onLevelChange()"></select>
        </div>
        <div class="left-header-group">
            <div class="score-text">النقاط التراكمية: <span id="total-score">0</span> 🏆</div>
            <button class="icon-btn" onclick="toggleSettingsModal()" title="إعدادات اللعبة">⚙️</button>
            <button class="icon-btn" onclick="handleGlobalBack()" title="الرجوع">🔙</button>
        </div>
    </div>

    <div id="stages-screen">
        <h1>لعبة الذاكرة والمطابقة 🎴</h1>
        <p style="color: var(--dark); font-size: 18px; font-weight: bold;">اختر المرحلة لتبدأ التحدي. طابق الكلمة مع معناها بأسرع وقت لجمع النجوم والنقاط!</p>
        <div id="random-hot-countdown" style="text-align: center; margin-bottom: 10px; font-size: 16px; font-weight: bold; color: var(--dark);"></div>
        <div class="stages-grid" id="stages-container"></div>
    </div>

    <div id="settings-modal" class="custom-modal">
        <div class="modal-content-box">
            <button class="btn-close-modal" onclick="toggleSettingsModal()">✖</button>
            <h3>⚙️ إعدادات الأوقات وإدارة المراحل</h3>
            
            <div class="settings-row parent-only-btn" style="background:#e2e8f0; padding:10px; border-radius:8px;">
                <label style="color:#334155; margin-bottom:5px;">إضافة/إنقاص وقت للجميع:</label>
                <input type="number" id="bulk-time" placeholder="ثواني" style="width:60px;">
                <button onclick="adjustBulkTime(1)" style="background:#3b82f6; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">➕ إضافة</button>
                <button onclick="adjustBulkTime(-1)" style="background:#ef4444; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">➖ إنقاص</button>
            </div>

            <div class="settings-row"><label>الوقت لـ 5 نجوم (ثانية):</label> <input type="number" id="time-5" class="parent-only-inputs" value="60"></div>
            <div class="settings-row"><label>الوقت لـ 4 نجوم (ثانية):</label> <input type="number" id="time-4" class="parent-only-inputs" value="70"></div>
            <div class="settings-row"><label>الوقت لـ 3 نجوم (ثانية):</label> <input type="number" id="time-3" class="parent-only-inputs" value="100"></div>
            <div class="settings-row"><label>الوقت لـ 2 نجوم (ثانية):</label> <input type="number" id="time-2" class="parent-only-inputs" value="140"></div>
            <div class="settings-row"><label>الوقت لـ 1 نجمة (ثانية):</label> <input type="number" id="time-1" class="parent-only-inputs" value="180"></div>
            <div class="settings-row"><label>نقاط النجمة الواحدة:</label> <input type="number" id="star-price" class="parent-only-inputs" value="5"></div>
            
            <div class="settings-row" style="background:#f8f9fc; padding:15px; border-radius:8px; border: 1px solid #e3e6f0;">
                <label style="display:block; width:100%; margin-bottom:10px;">نطاق تطبيق الأوقات الجديدة:</label>
                <div class="settings-row" style="background:transparent; padding:0; margin-bottom:0;">   
                    <input type="radio" id="apply-current" name="apply-scope" value="current" class="parent-only-inputs" checked> <label for="apply-current" style="min-width:auto; margin-left:15px;">على الصف المحدد</label>
                    <input type="radio" id="apply-all" name="apply-scope" value="all" class="parent-only-inputs"> <label for="apply-all" style="min-width:auto;">على جميع الصفوف</label>
                </div>
            </div>

            <div class="settings-row parent-only-btn" style="background:#fff3cd; padding:15px; border-radius:8px; border: 1px solid #ffeeba;">
                <label style="display:block; width:100%; margin-bottom:10px; color:#856404;">خيارات التصفير:</label>
                <div class="settings-row" style="background:transparent; padding:0; margin-bottom:0;">
                    <input type="radio" id="reset-none" name="reset-opt" value="none" checked> <label for="reset-none" style="min-width:auto; margin-left:15px;">دون تصفير</label>
                    <input type="radio" id="reset-curr" name="reset-opt" value="current"> <label for="reset-curr" style="min-width:auto; margin-left:15px;">تصفير المستوى الحالي</label>
                    <input type="radio" id="reset-all" name="reset-opt" value="all"> <label for="reset-all" style="min-width:auto;">تصفير الكل</label>
                </div>
            </div>

            <div class="action-btns parent-only-btn">
                <button class="btn-save" onclick="saveTimeSettings()">💾 حفظ الإعدادات</button>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <div class="game-controls">
            <h2 style="margin: 0; color: var(--primary);">المرحلة: <span id="current-stage-display">1</span></h2>
            <div class="timer">
                الوقت: <span id="timer-display">0</span> ثانية ⏱️
                <span id="live-stars" style="color: #f1c40f; font-size: 20px; margin-right: 15px; letter-spacing: 2px;">★★★★★</span>
            </div>
        </div>
        <div class="board" id="game-board"></div>
    </div>

    <div id="result-modal">
        <div class="modal-content">
            <h2 id="modal-title">أحسنت! أنهيت المرحلة 🎉</h2>
            <div class="stars-display" id="modal-stars">⭐⭐⭐</div>
            <p style="font-size: 18px; color: var(--dark);">وقت الإجابة: <strong id="modal-time" style="color: var(--danger);"></strong> ثانية</p>
            <p id="modal-points-msg" style="color: var(--success); font-weight: bold; font-size: 18px;"></p>
            <button class="modal-btn" onclick="showStagesScreen()">متابعة</button>
        </div>
    </div>

<script>
    const LEVEL_ORDER = [
        'CLASS1', 'CLASS2', 'CLASS3', 'CLASS4', 'CLASS5', 'CLASS6',
        'CLASS7', 'CLASS8', 'CLASS9', 'CLASS10', 'CLASS11', 'CLASS12',
        'A1', 'A2', 'B1', 'B2', 'C1', 'C2'
    ];

    const allLevelsData = {
        "A1": typeof levelA1_Words !== 'undefined' ? levelA1_Words : [], "A2": typeof levelA2_Words !== 'undefined' ? levelA2_Words : [],
        "B1": typeof levelB1_Words !== 'undefined' ? levelB1_Words : [], "B2": typeof levelB2_Words !== 'undefined' ? levelB2_Words : [],
        "C1": typeof levelC1_Words !== 'undefined' ? levelC1_Words : [], "C2": typeof levelC2_Words !== 'undefined' ? levelC2_Words : [],
        "CLASS1": typeof levelCLASS1_Words !== 'undefined' ? levelCLASS1_Words : [], "CLASS2": typeof levelCLASS2_Words !== 'undefined' ? levelCLASS2_Words : [],
        "CLASS3": typeof levelCLASS3_Words !== 'undefined' ? levelCLASS3_Words : [], "CLASS4": typeof levelCLASS4_Words !== 'undefined' ? levelCLASS4_Words : [],
        "CLASS5": typeof levelCLASS5_Words !== 'undefined' ? levelCLASS5_Words : [], "CLASS6": typeof levelCLASS6_Words !== 'undefined' ? levelCLASS6_Words : [],
        "CLASS7": typeof levelCLASS7_Words !== 'undefined' ? levelCLASS7_Words : [], "CLASS8": typeof levelCLASS8_Words !== 'undefined' ? levelCLASS8_Words : [],
        "CLASS9": typeof levelCLASS9_Words !== 'undefined' ? levelCLASS9_Words : [], "CLASS10": typeof levelCLASS10_Words !== 'undefined' ? levelCLASS10_Words : [],
        "CLASS11": typeof levelCLASS11_Words !== 'undefined' ? levelCLASS11_Words : [], "CLASS12": typeof levelCLASS12_Words !== 'undefined' ? levelCLASS12_Words : []
    };

    function getLevelName(code) {
        if (code === 'ALL') return 'جميع المستويات';
        if(code.startsWith('CLASS')) { 
            let num = code.replace('CLASS', ''); 
            let ordinals = {'1':'الأول','2':'الثاني','3':'الثالث','4':'الرابع','5':'الخامس','6':'السادس','7':'السابع','8':'الثامن','9':'التاسع','10':'العاشر','11':'الحادي عشر','12':'الثاني عشر'}; 
            return 'الصف ' + (ordinals[num] || num); 
        }
        return 'مستوى ' + code;
    }

    let appProgress = JSON.parse(localStorage.getItem('appProgress')) || { cumulativeScore: 0, levels: {} };
    let gameProgress = JSON.parse(localStorage.getItem('matchGameProgress')) || {};
    let gameTimeSettings = JSON.parse(localStorage.getItem('matchGameSettings')) || {};
    
    let currentLevel = "";
    let globalStagesList = [];
    const WORDS_PER_STAGE = 10;
    
    let activeStage = null;
    let timerInterval;
    let secondsElapsed = 0;
    let selectedCards = [];
    let matchesFound = 0;

    let consecutiveErrors = 0;
    let totalErrors = 0;
    let starPenalty = 0;

    let countdownInterval;

    window.onload = function() {
        applyGlobalModes();
        document.getElementById('total-score').innerText = Math.round(appProgress.cumulativeScore || 0);
        initializeDropdown();
    };

    function applyGlobalModes() {
        let isParent = localStorage.getItem('isParentMode') === 'true';
        let banner = document.getElementById('parent-mode-banner');
        if(banner) banner.style.display = isParent ? 'block' : 'none';

        let defaultEvent = { isActive: true, days: [5], multiplier: 2 };
        let eventData = JSON.parse(localStorage.getItem('gameEventData')) || defaultEvent;
        let today = new Date().getDay();
        let eventBanner = document.getElementById('event-active-banner');
        if(eventBanner) {
            if(eventData.isActive && eventData.days.includes(today)) {
                eventBanner.style.display = 'block';
                window.currentEventMultiplier = eventData.multiplier;
            } else {
                eventBanner.style.display = 'none';
                window.currentEventMultiplier = 1;
            }
        }
    }

    function showEventDetails() {
        let eventData = JSON.parse(localStorage.getItem('gameEventData')) || { multiplier: 2 };
        alert('🎉 حدث نشط!\nمضاعفة النقاط بمقدار ' + eventData.multiplier + 'x مرات.');
    }

    function handleGlobalBack() {
        const modal = document.getElementById('settings-modal');
        const gameScreen = document.getElementById('game-screen');
        if(modal.style.display === 'flex') { modal.style.display = 'none'; } 
        else if (gameScreen.style.display === 'block') { showStagesScreen(); } 
        else { window.location.href = 'game.html'; }
    }

    function initializeDropdown() {
        const selectElement = document.getElementById('level-select'); 
        selectElement.innerHTML = ''; 
        let hasCompletedLevels = false;
        
        let optionAll = document.createElement('option'); 
        optionAll.value = "ALL"; 
        optionAll.textContent = "جميع المستويات";
        selectElement.appendChild(optionAll);

        let availableLevels = Object.keys(appProgress.levels).sort((a, b) => {
            let idxA = LEVEL_ORDER.indexOf(a);
            let idxB = LEVEL_ORDER.indexOf(b);
            return (idxA === -1 ? 999 : idxA) - (idxB === -1 ? 999 : idxB);
        });

        availableLevels.forEach(lvl => {
            let lData = appProgress.levels[lvl]; 
            let isLevelFinished = lData.savedWords && lData.savedWords.length > 0;
            
            if (isLevelFinished) {
                let option = document.createElement('option'); 
                option.value = lvl; 
                option.textContent = getLevelName(lvl); 
                selectElement.appendChild(option); 
                hasCompletedLevels = true;
            }
        });
        
        if (!hasCompletedLevels) {
            selectElement.innerHTML = '<option value="">لا يوجد مستويات مكتملة</option>';
            document.getElementById('stages-container').innerHTML = '<p style="color:var(--danger); font-size:20px; font-weight:bold;">يجب عليك إتمام حفظ كلمات مستوى واحد أو صف واحد بالكامل في الحفظ اليومي لتتمكن من اللعب فيه.</p>';
            selectElement.disabled = true; 
            return;
        }
        
        selectElement.value = "ALL";
        currentLevel = "ALL"; 
        loadGameData(); 
        loadSettingsUI();
    }

    function onLevelChange() { 
        currentLevel = document.getElementById('level-select').value; 
        renderStages(); 
        loadSettingsUI(); 
    }

    function getLevelTimes(level) {
        let levelKey = level === "ALL" ? "GLOBAL_DEFAULT" : level;
        let defaultTimes = gameTimeSettings['GLOBAL_DEFAULT'] || { t5: 60, t4: 70, t3: 100, t2: 140, t1: 180, starPrice: 5 };
        return gameTimeSettings[levelKey] || defaultTimes;
    }

    function loadSettingsUI() {
        if(!currentLevel) return;
        let t = getLevelTimes(currentLevel);
        document.getElementById('time-5').value = t.t5;
        document.getElementById('time-4').value = t.t4;
        document.getElementById('time-3').value = t.t3;
        document.getElementById('time-2').value = t.t2;
        document.getElementById('time-1').value = t.t1;
        document.getElementById('star-price').value = t.starPrice !== undefined ? t.starPrice : 5;
    }

    function toggleSettingsModal() {
        let modal = document.getElementById('settings-modal');
        if(modal.style.display === 'flex') {
            modal.style.display = 'none';
        } else {
            loadSettingsUI();
            modal.style.display = 'flex';
            let isParent = localStorage.getItem('isParentMode') === 'true';
            document.querySelectorAll('.parent-only-inputs').forEach(el => el.disabled = !isParent);
            document.querySelectorAll('.parent-only-btn').forEach(btn => btn.style.display = isParent ? (btn.tagName === 'DIV' ? 'flex' : 'inline-block') : 'none');
        }
    }

    function adjustBulkTime(sign) {
        let val = parseInt(document.getElementById('bulk-time').value) || 0;
        if(val === 0) return;
        for(let i=1; i<=5; i++) {
            let el = document.getElementById('time-' + i);
            if(el) el.value = Math.max(0, parseInt(el.value) + (val * sign));
        }
    }

    function saveTimeSettings() {
        let t5 = parseInt(document.getElementById('time-5').value) || 60;
        let t4 = parseInt(document.getElementById('time-4').value) || 70;
        let t3 = parseInt(document.getElementById('time-3').value) || 100;
        let t2 = parseInt(document.getElementById('time-2').value) || 140;
        let t1 = parseInt(document.getElementById('time-1').value) || 180;
        let starPrice = parseInt(document.getElementById('star-price').value) || 5;
        
        if(!(t5 < t4 && t4 < t3 && t3 < t2 && t2 < t1)) { alert("تنبيه: يجب أن يكون الوقت منطقياً بحيث وقت الـ 5 نجوم هو الأقل."); return; }
        
        let newSettings = { t5, t4, t3, t2, t1, starPrice };
        
        let applyScope = document.querySelector('input[name="apply-scope"]:checked').value;
        if(applyScope === 'all') {
            gameTimeSettings['GLOBAL_DEFAULT'] = newSettings;
            let selectElement = document.getElementById('level-select');
            for (let i = 0; i < selectElement.options.length; i++) {
                if(selectElement.options[i].value && selectElement.options[i].value !== "ALL") {
                    gameTimeSettings[selectElement.options[i].value] = newSettings;
                }
            }
        } else {
            if(currentLevel && currentLevel !== "ALL") gameTimeSettings[currentLevel] = newSettings;
            if(currentLevel === "ALL") gameTimeSettings['GLOBAL_DEFAULT'] = newSettings;
        }
        localStorage.setItem('matchGameSettings', JSON.stringify(gameTimeSettings));

        let resetOpt = document.querySelector('input[name="reset-opt"]:checked').value;
        if(resetOpt === 'current' && currentLevel && currentLevel !== "ALL") {
            gameProgress[currentLevel] = { 1: { unlocked: true, stars: 0, time: 0 } };
            localStorage.setItem('matchGameProgress', JSON.stringify(gameProgress));
            renderStages();
        } else if (resetOpt === 'all' || (resetOpt === 'current' && currentLevel === "ALL")) {
            for(let lvl in gameProgress) gameProgress[lvl] = { 1: { unlocked: true, stars: 0, time: 0 } };
            localStorage.setItem('matchGameProgress', JSON.stringify(gameProgress));
            renderStages();
        }

        alert("تم حفظ الإعدادات بنجاح.");
        toggleSettingsModal();
    }

    function loadGameData() {
        globalStagesList = [];
        let availableLevelsList = Object.keys(appProgress.levels).sort((a, b) => {
            let idxA = LEVEL_ORDER.indexOf(a); let idxB = LEVEL_ORDER.indexOf(b);
            return (idxA === -1 ? 999 : idxA) - (idxB === -1 ? 999 : idxB);
        });

        let absoluteId = 1;
        availableLevelsList.forEach(lvl => {
            let savedCount = appProgress.levels[lvl].savedWords ? appProgress.levels[lvl].savedWords.length : 0;
            let levelWords = (allLevelsData[lvl] || []).slice(0, savedCount);
            if(levelWords.length === 0) return;
            
            let tStages = Math.ceil(levelWords.length / WORDS_PER_STAGE);
            for(let s = 1; s <= tStages; s++) {
                let startIndex = (s - 1) * WORDS_PER_STAGE;
                let endIndex = startIndex + WORDS_PER_STAGE;
                let stageWords = levelWords.slice(startIndex, endIndex);

                if (stageWords.length < WORDS_PER_STAGE && levelWords.length >= WORDS_PER_STAGE) {
                    let needed = WORDS_PER_STAGE - stageWords.length;
                    let previousWords = levelWords.slice(0, startIndex);
                    previousWords.sort(() => Math.random() - 0.5);
                    stageWords = stageWords.concat(previousWords.slice(0, needed));
                }

                globalStagesList.push({
                    id: absoluteId++,
                    level: lvl,
                    localStage: s,
                    words: stageWords
                });
            }
        });

        updateGlobalHotStages('matchg');
        renderStages();
    }

    function updateGlobalHotStages(gameKey) {
        let now = new Date().getTime();
        let savedData = JSON.parse(localStorage.getItem('hotStagesData_' + gameKey)) || {};

        if (!savedData.expiry || now > savedData.expiry || savedData.totalStages !== globalStagesList.length) {
            let last10 = [];
            let random10 = [];

            if (globalStagesList.length > 0) {
                last10 = globalStagesList.slice(-10).map(s => s.id);

                let pool = globalStagesList.filter(s => !last10.includes(s.id));
                let poolWithStars = pool.map(s => {
                    let prog = (gameProgress[s.level] && gameProgress[s.level][s.localStage]) ? gameProgress[s.level][s.localStage].stars : 0;
                    return { id: s.id, stars: prog };
                });

                poolWithStars.sort((a, b) => a.stars - b.stars);
                let eligible = poolWithStars.filter(s => s.stars < 5);
                
                let selectedRandom = [];
                let currentStarLevel = 0;

                while(selectedRandom.length < 10 && currentStarLevel <= 5 && eligible.length > 0) {
                    let tierStages = eligible.filter(s => s.stars === currentStarLevel);
                    tierStages.sort(() => Math.random() - 0.5);
                    while(tierStages.length > 0 && selectedRandom.length < 10) {
                        selectedRandom.push(tierStages.pop().id);
                    }
                    currentStarLevel++;
                }
                random10 = selectedRandom;
            }

            savedData = { last10, random10, expiry: now + (24 * 60 * 60 * 1000), totalStages: globalStagesList.length };
            localStorage.setItem('hotStagesData_' + gameKey, JSON.stringify(savedData));
        }

        window.currentHotLast10 = savedData.last10 || [];
        window.currentHotRandom10 = savedData.random10 || [];
        window.randomHotExpiry = savedData.expiry;
        startRandomHotCountdown(gameKey);
    }

    function startRandomHotCountdown(gameKey) {
        clearInterval(countdownInterval);
        updateCountdownDisplay(gameKey);
        countdownInterval = setInterval(() => updateCountdownDisplay(gameKey), 1000);
    }

    function updateCountdownDisplay(gameKey) {
        let el = document.getElementById('random-hot-countdown');
        if(!el) return;
        if(!window.randomHotExpiry) { el.innerText = ''; return; }
        let diff = window.randomHotExpiry - new Date().getTime();
        if(diff <= 0) {
            el.innerText = 'جاري التحديث...';
            updateGlobalHotStages(gameKey);
            renderStages();
            return;
        }
        let h = Math.floor(diff / (1000 * 60 * 60));
        let m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        let s = Math.floor((diff % (1000 * 60)) / 1000);
        el.innerHTML = `⏳ تجديد البطاقات العشوائية الملتهبة خلال: <b style="color:var(--danger)">${h}س ${m}د ${s}ث</b>`;
    }

    function renderStages() {
        const container = document.getElementById('stages-container'); 
        container.innerHTML = '';
        
        if(globalStagesList.length === 0) return;

        let renderedStages = currentLevel === "ALL" ? globalStagesList : globalStagesList.filter(s => s.level === currentLevel);

        renderedStages.forEach(stage => {
            let btn = document.createElement('button'); 
            btn.className = 'stage-btn';
            
            let isLastHot = window.currentHotLast10.includes(stage.id);
            let isRandomHot = window.currentHotRandom10.includes(stage.id);
            let isHot = isLastHot || isRandomHot;

            let levelData = gameProgress[stage.level] || {};
            let starsCount = levelData[stage.localStage]?.stars || 0; 
            let timeSpent = levelData[stage.localStage]?.time ? ` | ${levelData[stage.localStage].time}ث` : '';
            let starsHTML = '★'.repeat(starsCount) + '☆'.repeat(5 - starsCount);
            
            let prefix = stage.level.startsWith('CLASS') ? stage.level.replace('CLASS', '') : stage.level;
            let displayName = currentLevel === "ALL" ? `${prefix}.${stage.localStage}` : `مرحلة ${stage.localStage}`;

            if(isHot) {
                btn.classList.add('hot-stage');
                btn.innerHTML = `${displayName} <span class="hot-badge">🔥 1.5x</span><br><span class="stage-stars">${starsHTML} <span style="color:#fff; font-size:12px;">${timeSpent}</span></span>`;
            } else {
                btn.innerHTML = `${displayName} <br><span class="stage-stars">${starsHTML} <span style="color:#fff; font-size:12px;">${timeSpent}</span></span>`;
            }
            
            btn.onclick = () => {
                window.currentStageIsHot = isHot;
                startGame(stage);
            };
            container.appendChild(btn);
        });
        
        document.getElementById('total-score').innerText = Math.round(appProgress.cumulativeScore || 0);
    }

    function startGame(stageObj) {
        activeStage = stageObj;
        document.getElementById('stages-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        
        let prefix = activeStage.level.startsWith('CLASS') ? activeStage.level.replace('CLASS', '') : activeStage.level;
        let displayStr = currentLevel === "ALL" ? `${prefix}.${activeStage.localStage}` : activeStage.localStage;
        document.getElementById('current-stage-display').innerText = displayStr;
        
        consecutiveErrors = 0;
        totalErrors = 0;
        starPenalty = 0;

        let stageWords = [...activeStage.words];

        let cardsArray = [];
        stageWords.forEach(w => {
            cardsArray.push({text: w.en, id: w.id, type: 'en'});
            cardsArray.push({text: w.ar, id: w.id, type: 'ar'});
        });
        
        cardsArray.sort(() => Math.random() - 0.5);
        renderBoard(cardsArray);
        startTimer();
    }

    function renderBoard(cards) {
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        selectedCards = [];
        matchesFound = 0;

        cards.forEach(c => {
            let cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            cardDiv.innerText = c.text;
            cardDiv.onclick = () => flipCard(cardDiv, c.id);
            board.appendChild(cardDiv);
        });
    }

    function flipCard(element, id) {
        if(element.classList.contains('selected') || element.classList.contains('matched') || selectedCards.length >= 2) return;
        
        element.classList.add('selected');
        selectedCards.push({ element: element, id: id });

        if(selectedCards.length === 2) {
            setTimeout(checkMatch, 300);
        }
    }

    function handleMistake() {
        consecutiveErrors++;
        totalErrors++;
        
        if (consecutiveErrors === 2) {
            starPenalty++;
            consecutiveErrors = 0;
            totalErrors = 0;
        } else if (totalErrors === 3) {
            starPenalty++;
            consecutiveErrors = 0;
            totalErrors = 0;
        }
        updateLiveStars(secondsElapsed);
    }

    function handleCorrect() {
        consecutiveErrors = 0;
    }

    function checkMatch() {
        let c1 = selectedCards[0];
        let c2 = selectedCards[1];

        if(c1.id === c2.id) {
            c1.element.classList.remove('selected'); c1.element.classList.add('matched');
            c2.element.classList.remove('selected'); c2.element.classList.add('matched');
            matchesFound++;
            handleCorrect();

            if(matchesFound === WORDS_PER_STAGE) {
                setTimeout(endGame, 500);
            }
        } else {
            c1.element.classList.remove('selected');
            c2.element.classList.remove('selected');
            handleMistake(); 
        }
        selectedCards = [];
    }

    function getStarsForTime(time) {
        let t = getLevelTimes(activeStage.level);
        if(time <= t.t5) return 5;
        if(time <= t.t4) return 4;
        if(time <= t.t3) return 3;
        if(time <= t.t2) return 2;
        if(time <= t.t1) return 1;
        return 0;
    }

    function updateLiveStars(time) {
        let currentStars = Math.max(0, getStarsForTime(time) - starPenalty);
        document.getElementById('live-stars').innerText = '★'.repeat(currentStars) + '☆'.repeat(5 - currentStars);
    }

    function startTimer() {
        secondsElapsed = 0;
        document.getElementById('timer-display').innerText = secondsElapsed;
        document.getElementById('live-stars').innerText = '★★★★★';
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            secondsElapsed++;
            document.getElementById('timer-display').innerText = secondsElapsed;
            updateLiveStars(secondsElapsed);
        }, 1000);
    }

    function endGame() {
        clearInterval(timerInterval);
        let time = secondsElapsed;
        let stars = Math.max(0, getStarsForTime(time) - starPenalty);
        
        let levelData = gameProgress[activeStage.level] || {};
        let previousStars = levelData[activeStage.localStage]?.stars || 0;
        let pointsGained = 0;
        let t = getLevelTimes(activeStage.level);
        let starPrice = t.starPrice !== undefined ? t.starPrice : 5;

        if(stars > previousStars) {
            let hotMult = window.currentStageIsHot ? 1.5 : 1;
            pointsGained = Math.round((stars - previousStars) * starPrice * (window.currentEventMultiplier || 1) * hotMult);
            appProgress.cumulativeScore = (appProgress.cumulativeScore || 0) + pointsGained;
            localStorage.setItem('appProgress', JSON.stringify(appProgress));
            document.getElementById('total-score').innerText = Math.round(appProgress.cumulativeScore);
            levelData[activeStage.localStage] = { unlocked: true, stars: stars, time: time };
            
            let pointsHistory = JSON.parse(localStorage.getItem('pointsHistory')) || [];
            pointsHistory.push({ time: Date.now(), game: 'matchg', points: pointsGained });
            localStorage.setItem('pointsHistory', JSON.stringify(pointsHistory));
            
        } else if (!levelData[activeStage.localStage]) {
            levelData[activeStage.localStage] = { unlocked: true, stars: stars, time: time };
        }

        gameProgress[activeStage.level] = levelData;
        localStorage.setItem('matchGameProgress', JSON.stringify(gameProgress));

        showResultModal(stars, time, pointsGained);
    }

    function showResultModal(stars, time, points) {
        document.getElementById('modal-stars').innerText = '★'.repeat(stars) + '☆'.repeat(5 - Math.max(0, stars));
        document.getElementById('modal-time').innerText = time;
        let msgElement = document.getElementById('modal-points-msg');
        
        if(points > 0) {
            msgElement.innerText = `رائع! كسبت ${points} نقطة إضافية للعلامة التراكمية! 🏆`;
        } else {
            msgElement.innerText = `لم تحصل على نقاط جديدة. حاول بوقت أسرع وبأخطاء أقل لرفع نجومك! 💪`;
        }
        
        document.getElementById('result-modal').style.display = 'flex';
    }

    function showStagesScreen() {
        clearInterval(timerInterval);
        document.getElementById('result-modal').style.display = 'none';
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('stages-screen').style.display = 'block';
        renderStages();
    }
</script>
