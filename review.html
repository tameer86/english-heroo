<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المراجعة الشاملة والاختبارات</title>
    <style>
        :root { --primary: #4e73df; --success: #1cc88a; --danger: #e74a3b; --warning: #f6c23e; --light: #f8f9fc; }
        body { font-family: sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .mode-tab { padding: 15px 30px; font-size: 18px; font-weight: bold; border: none; cursor: pointer; border-radius: 8px; margin-left: 10px; }
        .active-tab { background-color: var(--primary); color: white; }
        .inactive-tab { background-color: #eaecf4; color: #5a5c69; }
        .controls-box { background: #f0f4f8; padding: 20px; border-radius: 10px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #e3e6f0; padding: 12px; text-align: center; }
        th { background: var(--primary); color: white; }
        .btn-audio { background: #36b9cc; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin: 2px; }
        .btn-action { padding: 12px 25px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; display: inline-block; }
    </style>
</head>
<body>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <a href="index.html?screen=dashboard" style="text-decoration: none; font-weight: bold; color: var(--primary);">🔙 العودة للوحة التحكم</a>
        <!-- كبسة عودة للقائمة الرئيسية إن لم يرد الطالب إكمال الامتحان (الخيار 23) -->
        <button class="btn-action" style="background: var(--danger); color: white;" onclick="abortTestSessionWithWarning()">🔙 إلغاء الاختبار والعودة فوراً للرئيسية</button>
    </div>

    <!-- تقسيم قسم المراجعة والاختبار إلى قسمين مستقلين تماماً فور الدخول (الخيار 30) -->
    <div style="margin-top: 20px; text-align: center;">
        <button id="tab-free" class="mode-tab active-tab" onclick="switchMainSection('free')">📖 قسم المراجعة الحرة</button>
        <button id="tab-test" class="mode-tab inactive-tab" onclick="switchMainSection('test')">📝 قسم المراجعة من خلال اختبار</button>
    </div>

    <div class="controls-box">
        <h3>🎯 تصفية المسارات والمستويات المفعلة للتقدم الحاضر</h3>
        <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: center;">
            <label>الصف أو المستوى الحالي للمراجعة:</label>
            <!-- القائمة تظهر فقط الصفوف والمستويات التي لدى الطالب بها تقدم وحفظ فقط (الخيار 20) ومسميات الصفوف صحيحة (الخيار 16) -->
            <select id="review-level-dropdown" onchange="loadWordsByProgress()">
                <!-- تتولد ديناميكياً بناءً على مصفوفة الحفظ الفعلية للطالب -->
            </select>

            <label>نظام اتجاه المراجعة اللغوية (انعكاس السهم الصحيح - الخيار 26):</label>
            <select id="review-direction">
                <option value="ar-en">عربي ➔ إنجليزي</option>
                <option value="en-ar">إنجليزي ➔ عربي</option>
            </select>
        </div>

        <!-- المراجعة التتابعية بدون لفظ غير عشوائية وبإظهار رقم الصفحة المقفل تلقائياً (الخيار 22) -->
        <div style="margin-top: 15px; background: white; padding: 10px; border-radius: 6px; border-right: 4px solid var(--warning);">
            📍 <strong>نظام المراجعة الجزئية التتابعية الموجهة:</strong> لقد وصلت سابقاً بشكل تلقائي إلى الصفحة رقم: 
            <input type="text" id="locked-page-num" readonly style="width: 50px; text-align: center; font-weight: bold; background: #eaecf4; border: 1px solid #d1d3e2;" value="1"> 
            (هذا الرقم يتغير تلقائياً عند إنهاء الصفحات ولا يمكن تعديله يدوياً)
        </div>
    </div>

    <!-- مساحة عرض الجداول والأنظمة الثلاثة المدعومة بالكامل (الم الشاملة، التراكمية، العشوائية) -->
    <div id="workspace-area">
        <table id="review-main-table">
            <thead>
                <tr id="table-headers-row">
                    <!-- تتشكل العناوين برمجياً بحذف كلمة الرئيسية نهائياً الخيار 28 ومراعاة سماعتي الصوت المنفصلتين الخيار 27 -->
                </tr>
            </thead>
            <tbody id="review-table-body">
                <!-- الصفوف والبيانات -->
            </tbody>
        </table>
    </div>

    <!-- كبسة المراجعة والاختبارات السفلية المطلوبة تماماً (الخيار 21) -->
    <div style="margin-top: 20px; text-align: center;" id="action-footer-btn">
        <button class="btn-action" style="background: var(--success); color: white; font-size:18px;" onclick="executeMainAction()">🏁 ابدأ المراجعة والاختبارات</button>
    </div>
</div>

<script>
    let currentMainSection = "free"; // الافتراضي هو المراجعة الحرة
    let studentSavedWords = [];

    function checkProgressData() {
        let stored = localStorage.getItem('appProgress');
        let progress = stored ? JSON.parse(stored) : { savedWords: [], lastReviewPage: 1 };
        studentSavedWords = progress.savedWords || [];
        
        // المحاكاة في حال عدم وجود كلمات لمنع جفاف الصفحة واختبار التصفية الفورية
        if(studentSavedWords.length === 0) {
            studentSavedWords = [
                { id: 101, en: "Apple", ar: "تفاح", level: "A1", ex_en: "I love eating a red apple every single morning / fresh.", ar_ex: "أنا أحب تناول تفاحة حمراء كل صباح \\ طازجة.", pronounceAr: "أَبِلْ" },
                { id: 102, en: "Book", ar: "كتاب", level: "CLASS1", ex_en: "Please read this textbook layout carefully.", ar_ex: "الرجاء قراءة تنسيق هذا الكتاب التعليمي بعناية.", pronounceAr: "بُوكْ" }
            ];
            progress.savedWords = studentSavedWords;
            progress.lastReviewPage = 3;
            localStorage.setItem('appProgress', JSON.stringify(progress));
        }

        document.getElementById('locked-page-num').value = progress.lastReviewPage || 1;
        buildActiveDropdown(studentSavedWords);
    }

    // بناء القائمة بناءً على ما يملكه الطالب من تقدم وحفظ فعلي فقط واستبدال التسميات الخاطئة (الخيارات 16، 19، 20)
    function buildActiveDropdown(words) {
        const select = document.getElementById('review-level-dropdown');
        select.innerHTML = "";
        
        // جلب التصنيفات الفريدة الحاضرة في صندوق حفظ الطالب
        let activeLevels = [...new Set(words.map(w => w.level))];
        
        const dictionary = {
            "A1": "مستوى A1", "A2": "مستوى A2", "B1": "مستوى B1", "B2": "مستوى B2", "C1": "مستوى C1", "C2": "مستوى C2",
            "CLASS1": "الصف الأول", "CLASS2": "الصف الثاني", "CLASS3": "الصف الثالث"
        };

        activeLevels.forEach(lvl => {
            let opt = document.createElement('option');
            opt.value = lvl;
            opt.text = dictionary[lvl] || lvl;
            select.appendChild(opt);
        });
    }

    function switchMainSection(section) {
        currentMainSection = section;
        document.getElementById('tab-free').className = (section === 'free') ? "mode-tab active-tab" : "mode-tab inactive-tab";
        document.getElementById('tab-test').className = (section === 'test') ? "mode-tab active-tab" : "mode-tab inactive-tab";
        loadWordsByProgress();
    }

    function loadWordsByProgress() {
        const tbody = document.getElementById('review-table-body');
        const theadRow = document.getElementById('table-headers-row');
        tbody.innerHTML = "";
        
        let direction = document.getElementById('review-direction').value;
        let selectedLvl = document.getElementById('review-level-dropdown').value;
        let filteredWords = studentSavedWords.filter(w => w.level === selectedLvl);

        // صياغة العناوين بحذف كلمة 'الرئيسية' نهائياً (الخيار 28)
        if(currentMainSection === "free") {
            theadRow.innerHTML = `<th>استماع منفصل</th><th>الكلمة / الجملة والمثال</th><th>الإجابات والنطق الصوتي التقريبي</th><th>إجراءات مسح الشاشة الحرة</th>`;
        } else {
            theadRow.innerHTML = `<th>إجراءات الاختبار الفعلي</th><th>الكلمة / العبارة المعروضة</th><th>مربع صياغة الإجابة والتدقيق</th><th>علامة التقييم والنسبة</th>`;
        }

        filteredWords.forEach(word => {
            const row = document.createElement('tr');
            row.id = `review-row-${word.id}`;

            if(currentMainSection === "free") {
                // مراجعة حرة: سماعتان منفصلتان واحدة للكلمة وواحدة للمثال (الخيار 27) وبدون تسجيل أو مايكروفونات وعلامات
                row.innerHTML = `
                    <td>
                        <button class="btn-audio" onclick="triggerFreeAudio('${word.en}', 'en-US', 'w', ${word.id})">🔊 الكلمة</button>
                        <button class="btn-audio" style="background:var(--success);" onclick="triggerFreeAudio('${word.ex_en}', 'en-US', 'ex', ${word.id})">🔊 المثال</button>
                    </td>
                    <td style="text-align:right;">
                        ${direction === 'ar-en' ? `عربي الحفظ: <strong>${word.ar}</strong>` : `إنجليزي الحفظ: <strong>${word.en}</strong>`}
                    </td>
                    <td style="text-align:right; font-size:14px;" id="free-answer-cell-${word.id}">
                        💡 اضغط أي سماعة لعرض الإجابة ونطقها التقريبي فوراً...
                    </td>
                    <td>
                        <button class="btn-audio" style="background:var(--danger);" onclick="clearSingleFreeRow(${word.id})">🔄 إعادة المحاولة</button>
                    </td>
                `;
            } else {
                // مراجعة من خلال اختبار: الاحتفاظ بنظام المايك والتسجيل والتدقيق والعلامات التراكمية الصارمة
                row.innerHTML = `
                    <td>
                        <button class="btn-audio" style="background:var(--danger);" onclick="startTestMic(${word.id}, '${direction === 'ar-en' ? word.en : word.ar}', '${direction === 'ar-en' ? 'en-US' : 'ar-SA'}')">🎙️ بدء نطق الإجابة للاختبار</button>
                    </td>
                    <td style="text-align:right;">
                        ${direction === 'ar-en' ? `ما هو مقابل: <strong>${word.ar}</strong> بالإنجليزية؟` : `ما هو مقابل: <strong>${word.en}</strong> بالعربية؟`}
                    </td>
                    <td id="test-spoken-cell-${word.id}" style="color:blue; font-weight:bold;">🕒 في انتظار سماع صوت الطالب...</td>
                    <td id="test-score-cell-${word.id}">-%</td>
                `;
            }
            tbody.appendChild(row);
        });
    }

    // المراجعة الحرة: عند نطق الإجابة الصحيحة تكتب أيضاً الإجابة ويكتب نطق الكلمة بالأحرف العربي (الخيار 30)
    function triggerFreeAudio(text, lang, type, wordId) {
        // نطق الرموز المائلة والشرطات كـ 'أو' أو 'or' بحسب اللغة الصوتية (الخيار 7)
        let cleanTxt = text.replace(/[-\/\\]/g, (lang.startsWith('ar') ? " أو " : " or "));
        const utterance = new SpeechSynthesisUtterance(cleanTxt);
        utterance.lang = lang;
        window.speechSynthesis.speak(utterance);

        let wordObj = studentSavedWords.find(w => w.id === wordId);
        if(!wordObj) return;

        const answerCell = document.getElementById(`free-answer-cell-${wordId}`);
        answerCell.innerHTML = `
            <div style="color:var(--success); font-weight:bold;">✅ الكلمة الصحيحة: ${wordObj.en}</div>
            <div style="color:#555;">📝 المثال الصحيح كاملاً: ${wordObj.ex_en}</div>
            <div style="color:var(--primary); font-weight:bold; margin-top:4px;">🗣️ نطق الكلمة باللغة العربية: [ ${wordObj.pronounceAr || 'أَبِلْ'} ]</div>
        `;
    }

    function clearSingleFreeRow(wordId) {
        const answerCell = document.getElementById(`free-answer-cell-${wordId}`);
        if(answerCell) {
            answerCell.innerHTML = `💡 اضغط أي سماعة لعرض الإجابة ونطقها التقريبي فوراً...`;
        }
    }

    // المايكروفونات عالية الكفاءة للاختبار دون استباق للنتائج المؤقتة (الخيار 29) مع تسوية الهمزات (الخيار 1)
    function startTestMic(wordId, correctTargetText, lang) {
        const spokenCell = document.getElementById(`test-spoken-cell-${wordId}`);
        spokenCell.innerHTML = "🎙️ جاري رصد الإجابة، تحدث الآن...";

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SpeechRecognition) { spokenCell.innerHTML = "غير مدعوم"; return; }

        const recognition = new SpeechRecognition();
        recognition.lang = lang;
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onresult = function(event) {
            let resultText = event.results[0][0].transcript;
            spokenCell.innerHTML = `لقد قلت: "${resultText}"`;

            // مطابقة وتسوية الهمزات
            const normalize = (t) => t.toLowerCase().replace(/[أإآ]/g, "ا").replace(/[.,\/#!$%\^&\*;:{}=\-_`~()؟?]/g,"").trim();
            let score = (normalize(resultText) === normalize(correctTargetText)) ? 100 : 0;

            document.getElementById(`test-score-cell-${wordId}`).innerText = `${score}%`;
            
            // محاكاة إظهار العلامة الكلية المحتسبة من أول محاولة (الخيار 24)
            if(score === 100) {
                alert("🌟 علامة إجمالية متميزة! هذه هي أول محاولة لك لهذه الصفحة وتم احتساب العلامة كاملة لرصيدك التراكمي العام بنجاح.");
                // تحديث مؤشر الصفحة التتابعي آلياً
                let progress = JSON.parse(localStorage.getItem('appProgress'));
                progress.lastReviewPage = (progress.lastReviewPage || 1) + 1;
                localStorage.setItem('appProgress', JSON.stringify(progress));
                document.getElementById('locked-page-num').value = progress.lastReviewPage;
            }
        };
        recognition.start();
    }

    function executeMainAction() {
        alert(`🏁 تم إطلاق مسار: [ ${currentMainSection === 'free' ? 'المراجعة الحرة المفتوحة' : 'منظومة الاختبار التقييمية التراكمية'} ] للصف الحالي بنجاح.`);
    }

    // التحذير الصارم عند الانسحاب أو كبس زر العودة وضياع النتيجة التراكمية (الخيارات 23، 25)
    function abortTestSessionWithWarning() {
        if(currentMainSection === "free") {
            // المراجعة الحرة ينتقل فوراً وبحرية تامة دون أي شروط أو رسائل تحذيرية
            window.location.href = 'index.html?screen=dashboard';
        } else {
            // شاشة الاختبار تحذر الطالب بدقة من ضياع العلامات
            let confirmAbort = confirm("⚠️ تحذير صارم جداً للطلاب: في حال الخروج أو كبس عودة أثناء الاختبار الحاضر، فإن كافة العلامات التي حصلت عليها في هذه الصفحة أو الصفحات السابقة لهذا الامتحان لن يتم احتسابها مطلقاً، وستضيع عليك نهائياً ولن تدخل في العلامة التراكمية! هل أنت متأكد من العودة؟");
            if(confirmAbort) {
                window.location.href = 'index.html?screen=dashboard';
            }
        }
    }

    window.onload = checkProgressData;
</script>
</body>
</html>
