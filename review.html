<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة المراجعة والاختبارات الذكية</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; padding: 20px; text-align: center; margin: 0; }
        .container { background: white; max-width: 1100px; margin: 0 auto; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #4e73df; }
        .section-box { border: 2px solid #e3e6f0; border-radius: 10px; padding: 20px; margin-bottom: 25px; text-align: right; background: #f8f9fc; }
        .section-title { font-size: 18px; font-weight: bold; color: #4e73df; margin-top: 0; margin-bottom: 15px; border-bottom: 2px solid #4e73df; padding-bottom: 5px; }
        label { font-weight: bold; margin-left: 10px; }
        select, input[type="number"] { padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        th, td { border: 1px solid #e3e6f0; padding: 12px; text-align: center; }
        thead { background: #4e73df; color: white; }
        .feedback-cell { background: #f8f9fc; text-align: right; padding: 10px; }
        .editable-input { width: 90%; padding: 8px; font-size: 14px; border-radius: 6px; border: 1px solid #cbd5e1; margin: 4px 0; font-weight: bold; }
        .btn-action { background: #1cc88a; color: white; border: none; padding: 12px 30px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 10px; }
        .btn-back { background: #5a5c69; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 10px; }
        .btn-clear { background: #e74a3b; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 10px; }
        .hidden { display: none !important; }
    </style>
    <script src="A1.js"></script><script src="A2.js"></script><script src="B1.js"></script><script src="B2.js"></script>
    <script src="C1.js"></script><script src="C2.js"></script>
    <script src="CLASS1.js"></script><script src="CLASS2.js"></script><script src="CLASS3.js"></script>
    <script src="CLASS4.js"></script><script src="CLASS5.js"></script><script src="CLASS6.js"></script>
    <script src="CLASS7.js"></script><script src="CLASS8.js"></script><script src="CLASS9.js"></script>
    <script src="CLASS10.js"></script><script src="CLASS11.js"></script><script src="CLASS12.js"></script>
    <script>
        function getLevelName(code) {
            if(code.startsWith('CLASS')) {
                let num = code.replace('CLASS', '');
                let ordinals = {'1':'الأول','2':'الثاني','3':'الثالث','4':'الرابع','5':'الخامس','6':'السادس','7':'السابع','8':'الثامن','9':'التاسع','10':'العاشر','11':'الحادي عشر','12':'الثاني عشر'};
                return 'الصف ' + (ordinals[num] || num);
            }
            return 'مستوى ' + code;
        }

        function formatForSpeech(text, lang) {
            if(!text) return "";
            if(lang === 'ar-SA') return text.replace(/[-\\\/]/g, ' او ');
            return text.replace(/[-\\\/]/g, ' or ');
        }
    </script>
</head>
<body>

<div class="container">
    <h1>🧠 منصة المراجعة والاختبارات الذكية للتميز</h1>
    
    <div id="setup-area" class="section-box">
        <div class="section-title">⚙️ أولاً: إعدادات وتخصيص الجلسة</div>
        
        <div style="margin-bottom:15px;">
            <label>اختر النظام:</label>
            <input type="radio" id="sys-free" name="sys-mode" checked> <label for="sys-free">مراجعة حرة (استماع فقط بدون علامات)</label>
            <input type="radio" id="sys-test" name="sys-mode"> <label for="sys-test">مراجعة من خلال اختبار (تسجيل وعلامات)</label>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
            <div>
                <label>تحديد المستوى للمراجعة:</label>
                <select id="review-level-select" style="width:60%;"></select>
            </div>
            <div>
                <label>طريقة العرض والتحكم:</label>
                <input type="radio" id="mode-ar-en" name="view-mode" checked> <label for="mode-ar-en">عربي ➔ إنجليزي</label>
                <input type="radio" id="mode-en-ar" name="view-mode"> <label for="mode-en-ar">إنجليزي ➔ عربي</label>
            </div>
        </div>

        <div class="section-title" style="margin-top:25px;">🎯 ثانياً: اختيار نوع المراجعة</div>
        <div>
            <input type="radio" id="type-all" name="rev-type" checked onclick="toggleTypeInputs()"> <label for="type-all">1. المراجعة الشاملة</label><br><br>
            <input type="radio" id="type-part" name="rev-type" onclick="toggleTypeInputs()"> <label for="type-part">2. المراجعة الجزئية التتابعية</label>
            <span id="part-inputs" class="hidden" style="margin-right:20px;">
                <label>عدد الصفحات المطلوبة:</label> <input type="number" id="part-pages" min="1" value="1" style="width:70px;">
                <span id="remaining-pages-info" style="margin-right: 15px; color: #5a5c69; font-weight:normal;"></span>
                <button class="btn-action" style="padding: 5px 10px; font-size:14px; background: #e74a3b;" onclick="resetPartialIndex()">إعادة البدء 🔄</button>
            </span><br><br>
            
            <input type="radio" id="type-random" name="rev-type" onclick="toggleTypeInputs()"> <label for="type-random">3. المراجعة الجزئية العشوائية</label>
            <div id="random-inputs" class="hidden" style="margin-right:40px; margin-top:10px;">
                <label>من صفحة:</label> <input type="number" id="rand-start" min="1" value="1" style="width:60px;">
                <label>إلى صفحة:</label> <input type="number" id="rand-end" min="1" value="2" style="width:60px;">
                <label>بعدد صفحات عشوائية:</label> <input type="number" id="rand-count" min="1" value="1" style="width:60px;">
            </div>
        </div>
        
        <div style="text-align:center; margin-top:25px;">
            <button class="btn-action" onclick="startReviewSession()">🚀 ابدأ المراجعة والاختبارات</button>
            <button class="btn-back" onclick="window.location.href='index.html?screen=dashboard'">🔙 العودة للوحة التحكم</button>
        </div>
    </div>

    <div id="test-area" class="hidden">
        <h2 id="test-page-title" style="color:#36b9cc;">الصفحة الحالية</h2>
        <h4 id="page-score-display" style="color:#4e73df; display:none;"></h4>
        <table>
            <thead>
                <tr>
                    <th width="15%">استماع المكتوب</th>
                    <th width="35%">المعطيات</th>
                    <th width="50%" id="action-col-header">تسجيل / إجابات</th>
                </tr>
            </thead>
            <tbody id="test-table-body"></tbody>
        </table>
        
        <div id="action-controls" style="margin-top:20px;">
            <button id="btn-check" class="btn-action hidden" onclick="evaluateCurrentPageAnswers()">📊 التحقق ومعرفة النتيجة المعتمدة</button>
            <button id="btn-retry" class="btn-action hidden" style="background:#f6c23e;" onclick="retryCurrentPage()">🔄 إعادة المحاولة لتعديل الأخطاء</button>
            <button id="btn-next" class="btn-action hidden" style="background:#4e73df;" onclick="moveToNextTestPage()">الصفحة التالية ➔</button>
            <button id="btn-finish" class="btn-action hidden" style="background:#1cc88a;" onclick="finishSessionReport()">🏆 إنهاء واستخراج التقرير النهائي</button>
            <button id="btn-clear-free" class="btn-clear hidden" onclick="renderTestPage()">🧹 مسح الشاشة (محاولة من جديد)</button>
            <button class="btn-back" onclick="returnToMenu()">🔙 عودة للقائمة الرئيسية</button>
        </div>
    </div>
    
    <div id="report-output" class="section-box hidden" style="margin-top:20px; background:#e8f5e9; border-color:#c8e6c9;"></div>
</div>

<script>
    const allLevelsData = {
        "A1": typeof levelA1_Words !== 'undefined' ? levelA1_Words : [], "A2": typeof levelA2_Words !== 'undefined' ? levelA2_Words : [],
        "B1": typeof levelB1_Words !== 'undefined' ? levelB1_Words : [], "B2": typeof levelB2_Words !== 'undefined' ? levelB2_Words : [],
        "C1": typeof levelC1_Words !== 'undefined' ? levelC1_Words : [], "C2": typeof levelC2_Words !== 'undefined' ? levelC2_Words : [],
        "CLASS1": typeof levelCLASS1_Words !== 'undefined' ? levelCLASS1_Words : [], "CLASS2": typeof levelCLASS2_Words !== 'undefined' ? levelCLASS2_Words : [],
        "CLASS3": typeof levelCLASS3_Words !== 'undefined' ? levelCLASS3_Words : [], "CLASS4": typeof levelCLASS4_Words !== 'undefined' ? levelCLASS4_Words : [],
        "CLASS5": typeof levelCLASS5_Words !== 'undefined' ? levelCLASS5_Words : [], "CLASS6": typeof levelCLASS6_Words !== 'undefined' ? levelCLASS6_Words : [],
        "CLASS7": typeof levelCLASS7_Words !== 'undefined' ? levelCLASS7_Words : [], "CLASS8": typeof levelCLASS8_Words !== 'undefined' ? levelCLASS8_Words : [],
        "CLASS9": typeof levelCLASS9_Words !== 'undefined' ? levelCLASS9_Words : [], "CLASS10": typeof levelCLASS10_Words !== 'undefined' ? levelCLASS10_Words : [],
        "CLASS11": typeof levelCLASS11_Words !== 'undefined' ? levelCLASS11_Words : [], "CLASS12": typeof levelCLASS12_Words !== 'undefined' ? levelCLASS12_Words : []
    };

    let appProgress = JSON.parse(localStorage.getItem('appProgress'));
    let selectedLevel = "";
    let testWordsChunks = [];
    let currentChunkIdx = 0;
    let currentAnswers = [];
    let sessionFirstAttemptScores = [];
    let isFirstAttemptOfThisPage = true;
    let currentSysMode = 'free';
    let currentReviewType = 1;

    window.onload = function() {
        let sel = document.getElementById('review-level-select');
        for(let l in appProgress.levels) {
            if(appProgress.levels[l].savedWords && appProgress.levels[l].savedWords.length > 0) {
                let opt = document.createElement('option'); opt.value = l; opt.text = getLevelName(l); sel.appendChild(opt);
            }
        }
        toggleTypeInputs();
        document.getElementById('review-level-select').addEventListener('change', updateSeqInfo);
        updateSeqInfo();
    };

    function updateSeqInfo() {
        let lvl = document.getElementById('review-level-select').value;
        if(!lvl) return;
        let lData = appProgress.levels[lvl];
        let startPage = Math.floor((lData.lastPartialIndex || 0) / 10) + 1;
        document.getElementById('remaining-pages-info').innerText = `وصلت سابقاً إلى صفحة: ${startPage}`;
    }

    function resetPartialIndex() {
        let lvl = document.getElementById('review-level-select').value;
        if(!lvl) { alert("يرجى اختيار المستوى أولاً."); return; }
        appProgress.levels[lvl].lastPartialIndex = 0;
        localStorage.setItem('appProgress', JSON.stringify(appProgress));
        updateSeqInfo();
        alert("تم إرجاع العداد التتابعي إلى البداية بنجاح.");
    }

    function toggleTypeInputs() {
        document.getElementById('part-inputs').classList.add('hidden');
        document.getElementById('random-inputs').classList.add('hidden');
        if(document.getElementById('type-part').checked) document.getElementById('part-inputs').classList.remove('hidden');
        if(document.getElementById('type-random').checked) document.getElementById('random-inputs').classList.remove('hidden');
    }

    function startReviewSession() {
        selectedLevel = document.getElementById('review-level-select').value;
        if(!selectedLevel) { alert("لا توجد مستويات محفوظة للمراجعة."); return; }
        
        currentSysMode = document.getElementById('sys-test').checked ? 'test' : 'free';
        let lData = appProgress.levels[selectedLevel];
        
        let savedIds = lData.savedWords.map(w => w.id);
        let fullDb = allLevelsData[selectedLevel] || [];
        let savedDbWords = fullDb.filter(w => savedIds.includes(w.id));

        testWordsChunks = [];
        currentChunkIdx = 0;
        sessionFirstAttemptScores = [];

        if(document.getElementById('type-all').checked) {
            currentReviewType = 1;
            for(let i=0; i<savedDbWords.length; i+=10) { testWordsChunks.push(savedDbWords.slice(i, i+10)); }
        }
        else if(document.getElementById('type-part').checked) {
            currentReviewType = 2;
            let reqPages = parseInt(document.getElementById('part-pages').value) || 1;
            let totalSavedPages = Math.ceil(savedDbWords.length / 10);
            if(reqPages > totalSavedPages) { alert("⚠️ خطأ منطقي: عدد الصفحات المطلوبة أكبر من المحفوظة!"); return; }
            
            let startW = (lData.lastPartialIndex || 0);
            if(startW >= savedDbWords.length) startW = 0; 
            
            let sliced = savedDbWords.slice(startW, startW + (reqPages * 10));
            for(let i=0; i<sliced.length; i+=10) { testWordsChunks.push(sliced.slice(i, i+10)); }
        }
        else if(document.getElementById('type-random').checked) {
            currentReviewType = 3;
            let sP = parseInt(document.getElementById('rand-start').value) || 1;
            let eP = parseInt(document.getElementById('rand-end').value) || 1;
            let rC = parseInt(document.getElementById('rand-count').value) || 1;

            if(sP > eP || rC > (eP - sP + 1)) { alert("⚠️ خطأ منطقي: تعارض في أرقام الفترة!"); return; }
            let pool = savedDbWords.slice((sP-1)*10, eP*10);
            if(pool.length === 0) { alert("⚠️ الفترة خارج المدى!"); return; }
            
            pool.sort(() => 0.5 - Math.random());
            let sliced = pool.slice(0, rC * 10);
            for(let i=0; i<sliced.length; i+=10) { testWordsChunks.push(sliced.slice(i, i+10)); }
        }

        document.getElementById('setup-area').classList.add('hidden');
        document.getElementById('test-area').classList.remove('hidden');
        document.getElementById('action-col-header').innerText = currentSysMode === 'test' ? 'تسجيل / إجابات' : 'الإجابات الصحيحة';
        renderTestPage();
    }

    function renderTestPage() {
        isFirstAttemptOfThisPage = true;
        document.getElementById('page-score-display').style.display = 'none';
        document.getElementById('test-page-title').innerText = `الصفحة ${currentChunkIdx + 1} من أصل ${testWordsChunks.length}`;
        
        const tbody = document.getElementById('test-table-body');
        tbody.innerHTML = "";
        
        let words = testWordsChunks[currentChunkIdx];
        let isArEn = document.getElementById('mode-ar-en').checked;
        currentAnswers = [];

        words.forEach((w, i) => {
            currentAnswers.push({ wordId: w.id, typedWord: "", typedEx: "" });
            let displayTxt = isArEn ? `الكلمة: ${w.ar}` : `Word: ${w.en}`;
            let displayEx = isArEn ? `المثال: ${w.ar_ex}` : `Example: ${w.ex_en}`;
            
            let listenWordTarget = isArEn ? w.ar : w.en;
            let listenWordLang = isArEn ? 'ar-SA' : 'en-US';
            
            let listenExTarget = isArEn ? w.ar_ex : w.ex_en;
            let listenExLang = isArEn ? 'ar-SA' : 'en-US';

            let tr = document.createElement('tr');
            
            let actionHtml = "";
            if (currentSysMode === 'test') {
                actionHtml = `
                    <label style="font-size:12px; color:blue;">إجابة الكلمة:</label>
                    <input type="text" id="input-word-${i}" class="editable-input" placeholder="سجل أو اكتب هنا" oninput="currentAnswers[i].typedWord=this.value"><br>
                    <label style="font-size:12px; color:blue;">إجابة المثال:</label>
                    <input type="text" id="input-ex-${i}" class="editable-input" placeholder="سجل أو اكتب هنا" oninput="currentAnswers[i].typedEx=this.value">
                    <div style="margin-top:5px;">
                        <button id="mic-w-${i}" style="background:#e74a3b; border:none; color:white; padding:4px 8px; border-radius:4px; cursor:pointer;" onclick="triggerMicCapture(${i}, 'word')">🎙️ مايك الكلمة</button>
                        <button id="mic-e-${i}" style="background:#e74a3b; border:none; color:white; padding:4px 8px; border-radius:4px; cursor:pointer;" onclick="triggerMicCapture(${i}, 'ex')">🎙️ مايك المثال</button>
                    </div>
                    <div id="live-box-${i}" style="color:#36b9cc; font-size:12px; font-weight:bold;"></div>
                `;
            } else {
                actionHtml = `
                    <div style="margin-bottom:10px;">
                        <button style="background:#1cc88a; border:none; padding:6px; border-radius:4px; color:white; cursor:pointer;" onclick="revealFreeAnswer(${i}, 'word', '${isArEn ? w.en : w.ar}', '${isArEn ? 'en-US' : 'ar-SA'}', '${w.pronounce}')">🔊 استماع للكلمة الصحيحة</button>
                        <div id="free-ans-word-${i}" style="margin-top:5px; font-weight:bold; color:#4e73df;"></div>
                    </div>
                    <div>
                        <button style="background:#1cc88a; border:none; padding:6px; border-radius:4px; color:white; cursor:pointer;" onclick="revealFreeAnswer(${i}, 'ex', '${isArEn ? w.ex_en : w.ar_ex}', '${isArEn ? 'en-US' : 'ar-SA'}', '')">🔊 استماع للمثال الصحيح</button>
                        <div id="free-ans-ex-${i}" style="margin-top:5px; font-weight:bold; color:#4e73df;"></div>
                    </div>
                `;
            }

            tr.innerHTML = `
                <td>
                    <button style="background:#f6c23e; border:none; padding:6px; margin:2px; border-radius:5px; cursor:pointer;" onclick="playReviewAudio('${listenWordTarget}', '${listenWordLang}')">🔊 كلمة</button><br>
                    <button style="background:#f6c23e; border:none; padding:6px; margin:2px; border-radius:5px; cursor:pointer;" onclick="playReviewAudio('${listenExTarget}', '${listenExLang}')">🔊 مثال</button>
                </td>
                <td style="text-align:right; font-weight:bold;">
                    <div>• ${displayTxt}</div>
                    <div style="margin-top:8px; color:#5a5c69; font-size:13px;">• ${displayEx}</div>
                </td>
                <td class="feedback-cell">${actionHtml}</td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('btn-check').classList.add('hidden');
        document.getElementById('btn-retry').classList.add('hidden');
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('btn-finish').classList.add('hidden');
        document.getElementById('btn-clear-free').classList.add('hidden');

        if (currentSysMode === 'test') {
            document.getElementById('btn-check').classList.remove('hidden');
        } else {
            document.getElementById('btn-clear-free').classList.remove('hidden');
            if(currentChunkIdx < testWordsChunks.length - 1) {
                document.getElementById('btn-next').classList.remove('hidden');
            } else {
                document.getElementById('btn-finish').classList.remove('hidden');
                document.getElementById('btn-finish').innerText = "إنهاء المراجعة الحرة";
            }
        }
    }

    function playReviewAudio(txt, lang) {
        let finalTxt = formatForSpeech(txt, lang);
        let ut = new SpeechSynthesisUtterance(finalTxt);
        ut.lang = lang;
        window.speechSynthesis.speak(ut);
    }

    function revealFreeAnswer(idx, type, text, lang, pronounce) {
        playReviewAudio(text, lang);
        let box = document.getElementById(`free-ans-${type}-${idx}`);
        if(type === 'word') {
            box.innerHTML = `${text} <br><small style="color:#f6c23e;">[ ${pronounce} ]</small>`;
        } else {
            box.innerHTML = `${text}`;
        }
    }

    function triggerMicCapture(i, targetType) {
        let isArEn = document.getElementById('mode-ar-en').checked;
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SpeechRec) return;
        
        let rec = new SpeechRec();
        rec.lang = isArEn ? "en-US" : "ar-SA";
        rec.interimResults = false;

        document.getElementById(`live-box-${i}`).innerText = `🎙️ تحدث الآن...`;

        rec.onresult = function(e) {
            let live = e.results[0][0].transcript;
            document.getElementById(`live-box-${i}`).innerText = ``;
            if(targetType === 'word') {
                document.getElementById(`input-word-${i}`).value = live; currentAnswers[i].typedWord = live;
            } else {
                document.getElementById(`input-ex-${i}`).value = live; currentAnswers[i].typedEx = live;
            }
        };
        rec.onerror = function() {
            document.getElementById(`live-box-${i}`).innerText = `⚠️ لم أسمعك بوضوح.`;
        };
        rec.start();
    }

    async function evaluateCurrentPageAnswers() {
        let words = testWordsChunks[currentChunkIdx];
        let isArEn = document.getElementById('mode-ar-en').checked;

        let checkBtn = document.getElementById('btn-check');
        checkBtn.innerText = "⏳ جاري التحليل الذكي عبر AI...";
        checkBtn.disabled = true;

        let payload = words.map((w, i) => ({
            id: i,
            targetWord: isArEn ? w.en : w.ar,
            spokenWord: currentAnswers[i].typedWord,
            targetEx: isArEn ? w.ex_en : w.ar_ex,
            spokenEx: currentAnswers[i].typedEx
        }));

        const apiKey = "AQ.Ab8RN6KgaUKrysi62BKlZHzoxZyryWshWn8C1Muf2jEGL9nEnw";
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent`;
        const promptText = `
        أنت معلم لغة إنجليزية.
        قم بتقييم نطق الطالب للكلمات والأمثلة. اعتبر الهمزات (أ،إ،آ،ا) متطابقة تماماً، وحرفي (ة،ه) متطابقين تماماً.
        البيانات المدخلة:
        ${JSON.stringify(payload)}

        قم بإرجاع النتيجة كمصفوفة JSON فقط بالشكل التالي بدقة وبدون أي نصوص إضافية أو علامات Markdown:
        [
          {
            "id": "يجب وضع نفس قيمة id المعطاة",
            "wordScore": (رقم من 0 إلى 100 يمثل نسبة تطابق الكلمة المنطوقة مع الكلمة المستهدفة),
            "wordComment": "تعليقك التشجيعي بالعربية على النطق",
            "exComment": "تعليقك التشجيعي بالعربية للمثال"
          }
        ]`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-goog-api-key': apiKey
                },
                body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
            });
            const data = await response.json();
            let text = data.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
            let results = JSON.parse(text);

            let totalWordScore = 0;

            results.forEach(res => {
                let i = res.id;
                let w = words[i];
                totalWordScore += res.wordScore;

                let infoBox = document.createElement('div');
                infoBox.style.fontSize = "12px"; infoBox.style.marginTop = "5px";
                infoBox.innerHTML = `
                    <span style="color:green;">✓ الصحيح:</span> [${isArEn ? w.en : w.ar}] | المثال: [${isArEn ? w.ex_en : w.ar_ex}]<br>
                    <span style="color:#4e73df;">🎯 دقة النطق للكلمة: ${res.wordScore}%</span><br>
                    <span style="color:#f6c23e;">💬 الكلمة: ${res.wordComment}</span><br>
                    <span style="color:#f6c23e;">💬 المثال: ${res.exComment}</span>
                `;
                document.getElementById(`live-box-${i}`).appendChild(infoBox);

                document.getElementById(`input-word-${i}`).disabled = true;
                document.getElementById(`input-ex-${i}`).disabled = true;
                document.getElementById(`mic-w-${i}`).disabled = true;
                document.getElementById(`mic-e-${i}`).disabled = true;
            });

            let pagePercentage = totalWordScore / words.length;
            let scoreOutOf10 = (pagePercentage / 100) * 10;

            let scoreMsg = `العلامة الكلية للصفحة: ${scoreOutOf10.toFixed(1)} من 10 (${Math.round(pagePercentage)}%). `;

            if(isFirstAttemptOfThisPage) {
                sessionFirstAttemptScores.push({ wScore: pagePercentage, eScore: 100 });
                scoreMsg += "هذه المحاولة الأولى (محتسبة).";
                isFirstAttemptOfThisPage = false;
            } else {
                scoreMsg += "هذه محاولة إعادة (غير محتسبة).";
            }

            let scoreDisp = document.getElementById('page-score-display');
            scoreDisp.innerText = scoreMsg;
            scoreDisp.style.display = 'block';

            checkBtn.innerText = "📊 التحقق ومعرفة النتيجة المعتمدة";
            checkBtn.disabled = false;
            checkBtn.classList.add('hidden');

            if(pagePercentage >= 70) {
                document.getElementById('btn-retry').classList.add('hidden');
                if(currentChunkIdx < testWordsChunks.length - 1) {
                    document.getElementById('btn-next').classList.remove('hidden');
                } else {
                    document.getElementById('btn-finish').classList.remove('hidden');
                }
            } else {
                document.getElementById('btn-retry').classList.remove('hidden');
            }

        } catch (err) {
            alert("حدث خطأ أثناء الاتصال بالذكاء الاصطناعي لتحليل البيانات. الرجاء المحاولة مرة أخرى.");
            checkBtn.innerText = "📊 التحقق ومعرفة النتيجة المعتمدة";
            checkBtn.disabled = false;
        }
    }

    function retryCurrentPage() {
        let words = testWordsChunks[currentChunkIdx];
        words.forEach((w, i) => {
            document.getElementById(`input-word-${i}`).disabled = false;
            document.getElementById(`input-ex-${i}`).disabled = false;
            document.getElementById(`mic-w-${i}`).disabled = false;
            document.getElementById(`mic-e-${i}`).disabled = false;
            document.getElementById(`live-box-${i}`).innerHTML = "";
        });
        document.getElementById('btn-check').classList.remove('hidden');
        document.getElementById('btn-retry').classList.add('hidden');
        document.getElementById('page-score-display').style.display = 'none';
    }

    function moveToNextTestPage() {
        currentChunkIdx++;
        renderTestPage();
    }

    function finishSessionReport() {
        if (currentReviewType === 2) {
            let reqPages = parseInt(document.getElementById('part-pages').value) || 1;
            let lData = appProgress.levels[selectedLevel];
            let startW = (lData.lastPartialIndex || 0);
            if(startW >= allLevelsData[selectedLevel].length) startW = 0;
            lData.lastPartialIndex = startW + (reqPages * 10);
            localStorage.setItem('appProgress', JSON.stringify(appProgress));
            updateSeqInfo();
        }

        if (currentSysMode === 'free') {
            window.location.href = "index.html?screen=dashboard";
            return;
        }

        let totalWAvg = 0;
        let html = `<h2>🏆 التقرير الاستراتيجي لنتائج الاختبار</h2>`;
        
        sessionFirstAttemptScores.forEach((s, idx) => {
            totalWAvg += s.wScore;
            html += `<p>• <strong>الصفحة (${idx+1}):</strong> دقة نطق الكلمات: ${Math.round(s.wScore)}%</p>`;
        });

        let finalWScore = totalWAvg / sessionFirstAttemptScores.length;
        
        let addedScore = (finalWScore / 100) * 10 * (testWordsChunks.length);
        if(isNaN(addedScore)) addedScore = 0;

        appProgress.cumulativeScore = (appProgress.cumulativeScore || 0) + addedScore;
        localStorage.setItem('appProgress', JSON.stringify(appProgress));

        html += `<hr><h3 style="color:#2e7d32;">🌟 النقاط التراكمية الجديدة المضافة: +${Math.round(addedScore)} نقطة!</h3>`;
        html += `<br><button class="btn-back" onclick="window.location.href='index.html?screen=dashboard'">🔙 العودة للوحة التحكم</button>`;
        
        document.getElementById('test-area').classList.add('hidden');
        const rep = document.getElementById('report-output');
        rep.innerHTML = html;
        rep.classList.remove('hidden');
    }

    function returnToMenu() {
        if (currentSysMode === 'test') {
            if(confirm("تنبيه: إذا عدت الآن، الصفحات التي لم تنهها أو المحاولات غير المكتملة لن تُحتسب ولن يتم تغيير العداد التتابعي ولن تدخل في علامتك التراكمية. هل تريد العودة؟")) {
                window.location.href = "index.html?screen=dashboard";
            }
        } else {
            window.location.href = "index.html?screen=dashboard";
        }
    }
</script>
</body>
</html>
