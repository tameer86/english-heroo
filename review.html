<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المراجعة والاختبارات الذكية</title>
	<script>
    (function checkActivation() {
        if (!localStorage.getItem('app_is_activated')) {
            alert("عذراً، يجب تفعيل النسخة أولاً من الشاشة الرئيسية!");
            window.location.replace("index.html"); 
        }
    })();
</script>
    <style>
        :root { --primary: #4e73df; --success: #1cc88a; --warning: #f6c23e; --danger: #e74a3b; --info: #36b9cc; --dark: #5a5c69; --light: #f8f9fc; --purple: #8540f5; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; padding: 15px; margin: 0; text-align: center; box-sizing: border-box; }
        * { box-sizing: border-box; }
        .container { background: white; max-width: 1100px; margin: 0 auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); font-size: clamp(20px, 4vw, 28px); margin-bottom: 20px; }
        
        .section-box { border: 2px solid #e3e6f0; border-radius: 10px; padding: 15px; margin-bottom: 20px; text-align: right; background: var(--light); }
        .section-title { font-size: 18px; font-weight: bold; color: var(--primary); margin-top: 0; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 5px; }
        label { font-weight: bold; margin-left: 10px; }
        select, input[type="number"], input[type="date"] { padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-weight: bold; font-family: inherit; }
        
        .controls-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        .controls-row > div { flex: 1 1 300px; }
        .rev-type-row { margin-bottom: 15px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
        
        .action-btns { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; margin-bottom: 20px;}
        .btn { padding: 12px 20px; font-size: clamp(14px, 3vw, 16px); border-radius: 8px; cursor: pointer; font-weight: bold; border: none; color: white; transition: 0.2s; flex: 1 1 150px; max-width: 300px; text-align: center; display: flex; align-items: center; justify-content: center;}
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-action { background: var(--success); }
        .btn-analyze { background: var(--info); }
        .btn-back { background: var(--dark); }
        .btn-clear { background: var(--danger); }
        .btn-retry { background: var(--warning); }
        .btn-next { background: var(--primary); }
        
        .table-responsive { width: 100%; overflow-x: auto; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 700px; }
        th, td { border: 1px solid #e3e6f0; padding: 12px; text-align: center; }
        thead { background: var(--primary); color: white; }
        .feedback-cell { background: var(--light); text-align: right; padding: 10px; }
        .editable-input { width: 100%; padding: 8px; font-size: 14px; border-radius: 6px; border: 1px solid #cbd5e1; margin: 4px 0; font-weight: bold; }
        
        .icon-btn { border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; margin: 2px; }
        .btn-mic { background: var(--danger); }
        .btn-speaker { background: var(--warning); }
        .btn-youglish { background: var(--purple); }

        .hidden { display: none !important; }

        /* الشاشات الصغيرة (الجوال والتابلت) */
        @media (max-width: 768px) {
            .table-responsive { box-shadow: none; background: transparent; overflow-x: visible;}
            table, thead, tbody, th, td, tr { display: block; width: 100%; }
            thead { display: none; }
            tr { background: white; margin-bottom: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #e3e6f0; padding: 10px; }
            td { text-align: right; padding: 10px 0; border: none; border-bottom: 1px dashed #eee; display: flex; flex-direction: column; gap: 8px;}
            td:last-child { border-bottom: none; }
            td:nth-child(1) { display: flex; flex-direction: row; flex-wrap: wrap; gap: 10px; justify-content: flex-start; align-items: center; }
            td:nth-child(1) br { display: none; }
            
            .controls-row { flex-direction: column; }
            .rev-type-row { flex-direction: column; align-items: stretch; }
            select, input[type="number"], input[type="date"], input[type="text"] { width: 100% !important; max-width: 100%; margin-top: 5px;}
            #part-inputs, #random-inputs, #last-pages-inputs, #last-days-inputs, #date-range-inputs { display: flex; flex-direction: column; align-items: stretch; margin-top: 10px; gap: 10px;}
        }
    </style>
    <script src="A1.js"></script><script src="A2.js"></script><script src="B1.js"></script><script src="B2.js"></script>
    <script src="C1.js"></script><script src="C2.js"></script>
    <script src="CLASS1.js"></script><script src="CLASS2.js"></script><script src="CLASS3.js"></script>
    <script src="CLASS4.js"></script><script src="CLASS5.js"></script><script src="CLASS6.js"></script>
    <script src="CLASS7.js"></script><script src="CLASS8.js"></script><script src="CLASS9.js"></script>
    <script src="CLASS10.js"></script><script src="CLASS11.js"></script><script src="CLASS12.js"></script>
    <script>
        function getLevelName(code) {
            if(code.startsWith('CLASS')) {
                let num = code.replace('CLASS', '');
                let ordinals = {'1':'الأول','2':'الثاني','3':'الثالث','4':'الرابع','5':'الخامس','6':'السادس','7':'السابع','8':'الثامن','9':'التاسع','10':'العاشر','11':'الحادي عشر','12':'الثاني عشر'};
                return 'الصف ' + (ordinals[num] || num);
            }
            return 'مستوى ' + code;
        }

        function normalizeArabic(text) {
            return text.replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه');
        }

        function cleanString(str) {
            if(!str) return "";
            return normalizeArabic(str.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()؟?]/g,"").replace(/\s+/g," ").trim());
        }

        function formatForSpeech(text, lang) {
            if(!text) return "";
            if(lang === 'ar-SA') return text.replace(/[-\\\/]/g, ' او ');
            return text.replace(/[-\\\/]/g, ' or ');
        }

        function openYouGlish(word) {
            window.open('https://youglish.com/pronounce/' + encodeURIComponent(word) + '/english', '_blank');
        }
    </script>
</head>
<body>

<div class="container">
    <h1>🧠 منصة المراجعة والاختبارات الذكية</h1>
    
    <div id="setup-area" class="section-box">
        <div class="section-title">⚙️ أولاً: إعدادات وتخصيص الجلسة</div>
        
        <div class="controls-row">
            <div>
                <label>اختر النظام:</label>
                <div style="margin-top: 8px;">
                    <input type="radio" id="sys-free" name="sys-mode" checked onchange="updateSeqInfo()"> <label for="sys-free">مراجعة حرة (استماع بدون علامات)</label><br>
                    <input type="radio" id="sys-test" name="sys-mode" onchange="updateSeqInfo()"> <label for="sys-test">مراجعة باختبار (تسجيل وعلامات)</label>
                </div>
            </div>
            <div>
                <label>تحديد المستوى:</label><br>
                <select id="review-level-select" style="width:100%; max-width: 250px; margin-top: 8px;" onchange="updateSeqInfo()"></select>
            </div>
            <div>
                <label>طريقة العرض:</label>
                <div style="margin-top: 8px;">
                    <input type="radio" id="mode-ar-en" name="view-mode" checked> <label for="mode-ar-en">عربي 👈 إنجليزي</label><br>
                    <input type="radio" id="mode-en-ar" name="view-mode"> <label for="mode-en-ar">إنجليزي 👈 عربي</label>
                </div>
            </div>
        </div>

        <div class="section-title" style="margin-top:15px;">🎯 ثانياً: اختيار نوع المراجعة <small style="color:var(--danger);">(الكلمات القديمة مستثناة)</small></div>
        
        <div class="rev-type-row">
            <div><input type="radio" id="type-all" name="rev-type" checked onclick="toggleTypeInputs()"> <label for="type-all">1. المراجعة الشاملة</label></div>
        </div>
        
        <div class="rev-type-row">
            <div><input type="radio" id="type-part" name="rev-type" onclick="toggleTypeInputs()"> <label for="type-part">2. المراجعة التتابعية</label></div>
            <div id="part-inputs" class="hidden">
                <label>صفحات:</label> <input type="number" id="part-pages" min="1" value="1" style="width:70px;">
                <span id="remaining-pages-info" style="color: var(--dark); font-size: 14px;"></span>
                <button class="icon-btn btn-mic" onclick="resetPartialIndex()">إعادة البدء 🔄</button>
            </div>
        </div>
        
        <div class="rev-type-row">
            <div><input type="radio" id="type-random" name="rev-type" onclick="toggleTypeInputs()"> <label for="type-random">3. المراجعة العشوائية المتقدمة</label></div>
            <div id="random-inputs" class="hidden">
                <label>من صفحة:</label> <input type="number" id="rand-start" min="1" value="1" style="width:60px;">
                <label>إلى صفحة:</label> <input type="number" id="rand-end" min="1" value="2" style="width:60px;">
                <label>عدد الكلمات:</label> <input type="number" id="rand-count" min="1" value="10" style="width:60px;">
            </div>
        </div>

        <div class="rev-type-row">
            <div><input type="radio" id="type-last-pages" name="rev-type" onclick="toggleTypeInputs()"> <label for="type-last-pages">4. مراجعة آخر الصفحات المنجزة</label></div>
            <div id="last-pages-inputs" class="hidden">
                <label>صفحات أخيرة:</label> <input type="number" id="last-pages-count" min="1" value="1" style="width:70px;">
            </div>
        </div>

        <div class="rev-type-row">
            <div><input type="radio" id="type-last-days" name="rev-type" onclick="toggleTypeInputs()"> <label for="type-last-days">5. مراجعة حسب آخر الأيام</label></div>
            <div id="last-days-inputs" class="hidden">
                <label>أيام أخيرة:</label> <input type="number" id="last-days-count" min="1" value="3" style="width:70px;">
            </div>
        </div>

        <div class="rev-type-row">
            <div><input type="radio" id="type-date-range" name="rev-type" onclick="toggleTypeInputs()"> <label for="type-date-range">6. مراجعة فترة زمنية محددة</label></div>
            <div id="date-range-inputs" class="hidden">
                <label>من:</label> <input type="date" id="rev-from-date">
                <label>إلى:</label> <input type="date" id="rev-to-date">
            </div>
        </div>
        
        <div class="action-btns">
            <button class="btn btn-action" onclick="startReviewSession()">🚀 ابدأ الجلسة</button>
            <button class="btn btn-back" onclick="window.location.href='index.html?screen=dashboard'">🔙 العودة</button>
        </div>
    </div>

    <div id="test-area" class="hidden">
        <h2 id="test-page-title" style="color:var(--info);">الصفحة الحالية</h2>
        <h4 id="page-score-display" style="color:var(--primary); display:none; background: var(--light); padding: 10px; border-radius: 8px;"></h4>
        
        <div id="action-controls" class="action-btns">
            <button id="btn-analyze" class="btn btn-analyze hidden" onclick="analyzeCurrentPageAnswers()">🤖 تحليل النطق</button>
            <button id="btn-retry" class="btn btn-retry hidden" onclick="retryCurrentPage()">🔄 إعادة المحاولة</button>
            <button id="btn-next" class="btn btn-next hidden" onclick="moveToNextTestPage()">الصفحة التالية ➔</button>
            <button id="btn-finish" class="btn btn-action hidden" onclick="finishSessionReport()">🏆 إنهاء التقرير</button>
            <button id="btn-clear-free" class="btn btn-clear hidden" onclick="renderTestPage()">🧹 مسح (محاولة جديدة)</button>
            <button class="btn btn-back" onclick="returnToMenu()">🔙 القائمة الرئيسية</button>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th width="15%">استماع</th>
                        <th width="35%">المعطيات</th>
                        <th width="50%" id="action-col-header">تسجيل / إجابات</th>
                    </tr>
                </thead>
                <tbody id="test-table-body"></tbody>
            </table>
        </div>
    </div>
    
    <div id="report-output" class="section-box hidden" style="margin-top:20px; background:#e8f5e9; border-color:#c8e6c9;"></div>
</div>

<script>
    const allLevelsData = {
        "A1": typeof levelA1_Words !== 'undefined' ? levelA1_Words : [], "A2": typeof levelA2_Words !== 'undefined' ? levelA2_Words : [],
        "B1": typeof levelB1_Words !== 'undefined' ? levelB1_Words : [], "B2": typeof levelB2_Words !== 'undefined' ? levelB2_Words : [],
        "C1": typeof levelC1_Words !== 'undefined' ? levelC1_Words : [], "C2": typeof levelC2_Words !== 'undefined' ? levelC2_Words : [],
        "CLASS1": typeof levelCLASS1_Words !== 'undefined' ? levelCLASS1_Words : [], "CLASS2": typeof levelCLASS2_Words !== 'undefined' ? levelCLASS2_Words : [],
        "CLASS3": typeof levelCLASS3_Words !== 'undefined' ? levelCLASS3_Words : [], "CLASS4": typeof levelCLASS4_Words !== 'undefined' ? levelCLASS4_Words : [],
        "CLASS5": typeof levelCLASS5_Words !== 'undefined' ? levelCLASS5_Words : [], "CLASS6": typeof levelCLASS6_Words !== 'undefined' ? levelCLASS6_Words : [],
        "CLASS7": typeof levelCLASS7_Words !== 'undefined' ? levelCLASS7_Words : [], "CLASS8": typeof levelCLASS8_Words !== 'undefined' ? levelCLASS8_Words : [],
        "CLASS9": typeof levelCLASS9_Words !== 'undefined' ? levelCLASS9_Words : [], "CLASS10": typeof levelCLASS10_Words !== 'undefined' ? levelCLASS10_Words : [],
        "CLASS11": typeof levelCLASS11_Words !== 'undefined' ? levelCLASS11_Words : [], "CLASS12": typeof levelCLASS12_Words !== 'undefined' ? levelCLASS12_Words : []
    };

    let appProgress = JSON.parse(localStorage.getItem('appProgress'));
    let selectedLevel = "";
    let testWordsChunks = [];
    let currentChunkIdx = 0;
    let currentAnswers = [];
    let sessionFirstAttemptScores = [];
    let isFirstAttemptOfThisPage = true;
    let currentSysMode = 'free';
    let currentReviewType = 1;

    window.onload = function() {
        let sel = document.getElementById('review-level-select');
        for(let l in appProgress.levels) {
            if(appProgress.levels[l].savedWords && appProgress.levels[l].savedWords.length > 0) {
                let opt = document.createElement('option'); opt.value = l; opt.text = getLevelName(l); sel.appendChild(opt);
            }
        }
        toggleTypeInputs();
        updateSeqInfo();
    };

    function updateSeqInfo() {
        let lvl = document.getElementById('review-level-select').value;
        if(!lvl) return;
        let lData = appProgress.levels[lvl];
        let mode = document.getElementById('sys-test').checked ? 'Test' : 'Free';
        let idxKey = 'lastPartialIndex' + mode;
        let startPage = Math.floor((lData[idxKey] || 0) / 10) + 1;
        document.getElementById('remaining-pages-info').innerText = `وصلت سابقاً إلى صفحة: ${startPage}`;
    }

    function resetPartialIndex() {
        let lvl = document.getElementById('review-level-select').value;
        if(!lvl) { alert("يرجى اختيار المستوى أولاً."); return; }
        let mode = document.getElementById('sys-test').checked ? 'Test' : 'Free';
        let idxKey = 'lastPartialIndex' + mode;
        appProgress.levels[lvl][idxKey] = 0;
        localStorage.setItem('appProgress', JSON.stringify(appProgress));
        updateSeqInfo();
        alert("تم إرجاع العداد التتابعي إلى البداية بنجاح.");
    }

    function toggleTypeInputs() {
        document.getElementById('part-inputs').classList.add('hidden');
        document.getElementById('random-inputs').classList.add('hidden');
        document.getElementById('last-pages-inputs').classList.add('hidden');
        document.getElementById('last-days-inputs').classList.add('hidden');
        document.getElementById('date-range-inputs').classList.add('hidden');
        
        if(document.getElementById('type-part').checked) document.getElementById('part-inputs').classList.remove('hidden');
        if(document.getElementById('type-random').checked) document.getElementById('random-inputs').classList.remove('hidden');
        if(document.getElementById('type-last-pages').checked) document.getElementById('last-pages-inputs').classList.remove('hidden');
        if(document.getElementById('type-last-days').checked) document.getElementById('last-days-inputs').classList.remove('hidden');
        if(document.getElementById('type-date-range').checked) document.getElementById('date-range-inputs').classList.remove('hidden');
    }

    function startReviewSession() {
        selectedLevel = document.getElementById('review-level-select').value;
        if(!selectedLevel) { alert("لا توجد مستويات محفوظة للمراجعة."); return; }
        
        currentSysMode = document.getElementById('sys-test').checked ? 'test' : 'free';
        let lData = appProgress.levels[selectedLevel];
        let fullDb = allLevelsData[selectedLevel] || [];
        
        let validSavedWords = lData.savedWords.filter(w => w.isOld !== true && w.date !== "تم حفظها قديماً");
        let validIds = validSavedWords.map(w => w.id);
        let savedDbWords = fullDb.filter(w => validIds.includes(w.id));

        if(savedDbWords.length === 0) { alert("⚠️ لا توجد كلمات جديدة محفوظة في هذا المستوى."); return; }

        testWordsChunks = [];
        currentChunkIdx = 0;
        sessionFirstAttemptScores = [];

        if(document.getElementById('type-all').checked) {
            currentReviewType = 1;
            for(let i=0; i<savedDbWords.length; i+=10) { testWordsChunks.push(savedDbWords.slice(i, i+10)); }
        }
        else if(document.getElementById('type-part').checked) {
            currentReviewType = 2;
            let reqPages = parseInt(document.getElementById('part-pages').value) || 1;
            let totalSavedPages = Math.ceil(savedDbWords.length / 10);
            if(reqPages > totalSavedPages) { alert("⚠️ خطأ منطقي: عدد الصفحات المطلوبة أكبر من المحفوظة!"); return; }
            
            let idxKey = currentSysMode === 'test' ? 'lastPartialIndexTest' : 'lastPartialIndexFree';
            let startW = (lData[idxKey] || 0);
            if(startW >= savedDbWords.length) startW = 0; 
            
            let sliced = savedDbWords.slice(startW, startW + (reqPages * 10));
            for(let i=0; i<sliced.length; i+=10) { testWordsChunks.push(sliced.slice(i, i+10)); }
        }
        else if(document.getElementById('type-random').checked) {
            currentReviewType = 3;
            let sP = parseInt(document.getElementById('rand-start').value) || 1;
            let eP = parseInt(document.getElementById('rand-end').value) || 1;
            let rW = parseInt(document.getElementById('rand-count').value) || 10;

            if(sP > eP) { alert("⚠️ خطأ: صفحة البداية أكبر من النهاية!"); return; }
            let pool = savedDbWords.slice((sP-1)*10, eP*10);
            if(pool.length === 0) { alert("⚠️ الفترة خارج المدى المحفوظ!"); return; }
            if(rW > pool.length) { alert("⚠️ خطأ: الكلمات المطلوبة أكبر من المتوفرة في الفترة!"); return; }
            
            pool.sort(() => 0.5 - Math.random());
            let sliced = pool.slice(0, rW);
            for(let i=0; i<sliced.length; i+=10) { testWordsChunks.push(sliced.slice(i, i+10)); }
        }
        else if(document.getElementById('type-last-pages').checked) {
            currentReviewType = 4;
            let reqPages = parseInt(document.getElementById('last-pages-count').value) || 1;
            let totalSavedPages = Math.ceil(savedDbWords.length / 10);
            if(reqPages > totalSavedPages) { alert("⚠️ خطأ: عدد الصفحات المطلوبة أكبر من المحفوظة!"); return; }
            
            let startIdx = Math.max(0, savedDbWords.length - (reqPages * 10));
            let sliced = savedDbWords.slice(startIdx);
            for(let i=0; i<sliced.length; i+=10) { testWordsChunks.push(sliced.slice(i, i+10)); }
        }
        else if(document.getElementById('type-last-days').checked) {
            currentReviewType = 5;
            let days = parseInt(document.getElementById('last-days-count').value) || 1;
            let cutoff = Date.now() - (days * 24 * 60 * 60 * 1000);
            let timeFiltered = validSavedWords.filter(w => w.unixTime && w.unixTime >= cutoff).map(w => w.id);
            let targetWords = fullDb.filter(w => timeFiltered.includes(w.id));
            
            if(targetWords.length === 0) { alert("⚠️ لم يتم حفظ أي كلمات جديدة في آخر " + days + " أيام."); return; }
            for(let i=0; i<targetWords.length; i+=10) { testWordsChunks.push(targetWords.slice(i, i+10)); }
        }
        else if(document.getElementById('type-date-range').checked) {
            currentReviewType = 6;
            let dF = new Date(document.getElementById('rev-from-date').value).getTime();
            let dT = new Date(document.getElementById('rev-to-date').value);
            if(isNaN(dF) || isNaN(dT.getTime())) { alert("⚠️ يرجى تحديد فترة زمنية صحيحة!"); return; }
            dT.setHours(23,59,59,999);
            
            let timeFiltered = validSavedWords.filter(w => w.unixTime && w.unixTime >= dF && w.unixTime <= dT.getTime()).map(w => w.id);
            let targetWords = fullDb.filter(w => timeFiltered.includes(w.id));
            
            if(targetWords.length === 0) { alert("⚠️ لا توجد كلمات محفوظة في هذه الفترة الزمنية."); return; }
            for(let i=0; i<targetWords.length; i+=10) { testWordsChunks.push(targetWords.slice(i, i+10)); }
        }

        document.getElementById('setup-area').classList.add('hidden');
        document.getElementById('test-area').classList.remove('hidden');
        document.getElementById('action-col-header').innerText = currentSysMode === 'test' ? 'تسجيل / إجابات' : 'الإجابات الصحيحة';
        renderTestPage();
    }

    function renderTestPage() {
        isFirstAttemptOfThisPage = true;
        document.getElementById('page-score-display').style.display = 'none';
        document.getElementById('test-page-title').innerText = `الصفحة ${currentChunkIdx + 1} من أصل ${testWordsChunks.length}`;
        
        const tbody = document.getElementById('test-table-body');
        tbody.innerHTML = "";
        
        let words = testWordsChunks[currentChunkIdx];
        let isArEn = document.getElementById('mode-ar-en').checked;
        currentAnswers = [];

        words.forEach((w, i) => {
            currentAnswers.push({ wordId: w.id, targetWord: isArEn ? w.en : w.ar, targetEx: isArEn ? w.ex_en : w.ar_ex, typedWord: "", typedEx: "" });
            let displayTxt = isArEn ? `الكلمة: ${w.ar}` : `Word: ${w.en}`;
            let displayEx = isArEn ? `المثال: ${w.ar_ex}` : `Example: ${w.ex_en}`;
            
            let listenWordTarget = isArEn ? w.ar : w.en;
            let listenWordLang = isArEn ? 'ar-SA' : 'en-US';
            let listenExTarget = isArEn ? w.ar_ex : w.ex_en;
            let listenExLang = isArEn ? 'ar-SA' : 'en-US';

            let tr = document.createElement('tr');
            
            let actionHtml = "";
            if (currentSysMode === 'test') {
                actionHtml = `
                    <label style="font-size:12px; color:var(--primary); display:block; text-align:right;">الكلمة:</label>
                    <input type="text" id="input-word-${i}" class="editable-input" placeholder="اكتب أو سجل" oninput="currentAnswers[${i}].typedWord=this.value">
                    <label style="font-size:12px; color:var(--primary); display:block; text-align:right; margin-top:5px;">المثال:</label>
                    <input type="text" id="input-ex-${i}" class="editable-input" placeholder="اكتب أو سجل" oninput="currentAnswers[${i}].typedEx=this.value">
                    <div style="margin-top:8px; display:flex; gap:5px; justify-content:flex-end;">
                        <button id="mic-w-${i}" class="icon-btn btn-mic" onclick="triggerMicCapture(${i}, 'word')">🎙️ للكلمة</button>
                        <button id="mic-e-${i}" class="icon-btn btn-mic" onclick="triggerMicCapture(${i}, 'ex')">🎙️ للمثال</button>
                    </div>
                    <div id="live-box-${i}" style="color:var(--info); font-size:12px; font-weight:bold; margin-top:5px; text-align:right;"></div>
                `;
            } else {
                actionHtml = `
                    <div style="margin-bottom:10px;">
                        <button class="icon-btn btn-action" onclick="revealFreeAnswer(${i}, 'word', '${isArEn ? w.en : w.ar}', '${isArEn ? 'en-US' : 'ar-SA'}', '${w.pronounce}')">🔊 كشف الكلمة</button>
                        <div id="free-ans-word-${i}" style="margin-top:5px; font-weight:bold; color:var(--primary);"></div>
                    </div>
                    <div>
                        <button class="icon-btn btn-action" onclick="revealFreeAnswer(${i}, 'ex', '${isArEn ? w.ex_en : w.ar_ex}', '${isArEn ? 'en-US' : 'ar-SA'}', '')">🔊 كشف المثال</button>
                        <div id="free-ans-ex-${i}" style="margin-top:5px; font-weight:bold; color:var(--primary);"></div>
                    </div>
                `;
            }

            tr.innerHTML = `
                <td>
                    <button class="icon-btn btn-speaker" onclick="playReviewAudio('${listenWordTarget}', '${listenWordLang}')">🔊 كلمة</button>
                    <button class="icon-btn btn-youglish" onclick="openYouGlish('${w.en}')">📺 YG</button>
                    <button class="icon-btn btn-speaker" onclick="playReviewAudio('${listenExTarget}', '${listenExLang}')">🔊 مثال</button>
                </td>
                <td style="text-align:right; font-weight:bold;">
                    <div style="color:var(--dark);">• ${displayTxt}</div>
                    <div style="margin-top:10px; color:#7f8c8d; font-size:13px;">• ${displayEx}</div>
                </td>
                <td class="feedback-cell">${actionHtml}</td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('btn-analyze').classList.add('hidden');
        document.getElementById('btn-retry').classList.add('hidden');
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('btn-finish').classList.add('hidden');
        document.getElementById('btn-clear-free').classList.add('hidden');

        if (currentSysMode === 'test') {
            document.getElementById('btn-analyze').classList.remove('hidden');
        } else {
            document.getElementById('btn-clear-free').classList.remove('hidden');
            if(currentChunkIdx < testWordsChunks.length - 1) {
                document.getElementById('btn-next').classList.remove('hidden');
            } else {
                document.getElementById('btn-finish').classList.remove('hidden');
                document.getElementById('btn-finish').innerText = "إنهاء الجلسة الحرة";
            }
        }
    }

    function playReviewAudio(txt, lang) {
        let finalTxt = formatForSpeech(txt, lang);
        let ut = new SpeechSynthesisUtterance(finalTxt);
        ut.lang = lang;
        window.speechSynthesis.speak(ut);
    }

    function revealFreeAnswer(idx, type, text, lang, pronounce) {
        playReviewAudio(text, lang);
        let box = document.getElementById(`free-ans-${type}-${idx}`);
        if(type === 'word') {
            box.innerHTML = `${text} <br><small style="color:var(--warning);">[ ${pronounce} ]</small>`;
        } else {
            box.innerHTML = `${text}`;
        }
    }

    function triggerMicCapture(i, targetType) {
        let isArEn = document.getElementById('mode-ar-en').checked;
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SpeechRec) return;
        
        let rec = new SpeechRec();
        rec.lang = isArEn ? "en-US" : "ar-SA";
        rec.interimResults = false;

        document.getElementById(`live-box-${i}`).innerText = `🎙️ تحدث الآن...`;

        rec.onresult = function(e) {
            let live = e.results[0][0].transcript;
            if(targetType === 'word') {
                document.getElementById(`input-word-${i}`).value = live; currentAnswers[i].typedWord = live;
                document.getElementById(`live-box-${i}`).innerHTML = `🎙️ للكلمة: <strong style="color:var(--primary);">${live}</strong>`;
            } else {
                document.getElementById(`input-ex-${i}`).value = live; currentAnswers[i].typedEx = live;
                document.getElementById(`live-box-${i}`).innerHTML = `🎙️ للمثال: <strong style="color:var(--primary);">${live}</strong>`;
            }
        };
        rec.onerror = function() {
            document.getElementById(`live-box-${i}`).innerText = `⚠️ لم أسمعك بوضوح.`;
        };
        rec.start();
    }

    async function analyzeCurrentPageAnswers() {
        let settings = JSON.parse(localStorage.getItem('audioSettings')) || {};
        let apiKey = settings.geminiApiKey;

        if (!apiKey) { alert("❌ الرجاء إدخال Gemini API Key في الإعدادات!"); return; }
        let isArEn = document.getElementById('mode-ar-en').checked;
        let analyzeBtn = document.getElementById('btn-analyze');
        analyzeBtn.innerText = "⏳ التحليل الذكي...";
        analyzeBtn.disabled = true;

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${apiKey}`;
        const promptText = `أنت معلم لغة إنجليزية. قيم نطق الطالب للكلمات والأمثلة التالية: ${JSON.stringify(currentAnswers)}. أرجع فقط JSON Format: [{"wordId":"id","wordScore":80,"wordComment":"تعليق بالعربي","exComment":"تعليق بالعربي"}]`;

        try {
            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] }) });
            const data = await response.json();
            
            if (data.error) { throw new Error("API Error"); }

            let text = data.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
            let results = JSON.parse(text);
            let totalWordScore = 0; let words = testWordsChunks[currentChunkIdx];

            results.forEach(res => {
                let ansIndex = currentAnswers.findIndex(a => a.wordId === res.wordId);
                if (ansIndex > -1) {
                    let w = words[ansIndex]; totalWordScore += res.wordScore;
                    let infoBox = document.createElement('div');
                    infoBox.style.fontSize = "12px"; infoBox.style.marginTop = "5px";
                    infoBox.innerHTML = `<span style="color:var(--success);">✓ الصحيح:</span> [${isArEn ? w.en : w.ar}] | المثال: [${isArEn ? w.ex_en : w.ar_ex}]<br><span style="color:var(--primary);">🎯 دقة: ${res.wordScore}%</span><br><span style="color:var(--warning);">💬 ${res.wordComment}</span><br><span style="color:var(--warning);">💬 ${res.exComment}</span>`;
                    document.getElementById(`live-box-${ansIndex}`).appendChild(infoBox);
                    document.getElementById(`input-word-${ansIndex}`).disabled = true; document.getElementById(`input-ex-${ansIndex}`).disabled = true;
                    document.getElementById(`mic-w-${ansIndex}`).disabled = true; document.getElementById(`mic-e-${ansIndex}`).disabled = true;
                }
            });

            let pagePercentage = totalWordScore / words.length; let scoreOutOf10 = (pagePercentage / 100) * 10;
            let scoreMsg = `علامة الصفحة: ${scoreOutOf10.toFixed(1)}/10 (${Math.round(pagePercentage)}%). `;
            if(isFirstAttemptOfThisPage) { sessionFirstAttemptScores.push({ wScore: pagePercentage, eScore: 100 }); scoreMsg += "محاولة أولى (محتسبة)."; isFirstAttemptOfThisPage = false; } else { scoreMsg += "محاولة إعادة (غير محتسبة)."; }

            let scoreDisp = document.getElementById('page-score-display'); scoreDisp.innerText = scoreMsg; scoreDisp.style.display = 'block';

            analyzeBtn.innerText = "🤖 تحليل النطق"; analyzeBtn.disabled = false; analyzeBtn.classList.add('hidden');
            if(pagePercentage >= 70) {
                document.getElementById('btn-retry').classList.add('hidden');
                if(currentChunkIdx < testWordsChunks.length - 1) document.getElementById('btn-next').classList.remove('hidden');
                else document.getElementById('btn-finish').classList.remove('hidden');
            } else { document.getElementById('btn-retry').classList.remove('hidden'); }
        } catch (err) {
            alert("حدث خطأ بالاتصال بالذكاء الاصطناعي."); analyzeBtn.innerText = "🤖 تحليل النطق"; analyzeBtn.disabled = false;
        }
    }

    function retryCurrentPage() {
        let words = testWordsChunks[currentChunkIdx];
        words.forEach((w, i) => {
            document.getElementById(`input-word-${i}`).disabled = false; document.getElementById(`input-ex-${i}`).disabled = false;
            document.getElementById(`mic-w-${i}`).disabled = false; document.getElementById(`mic-e-${i}`).disabled = false;
            document.getElementById(`live-box-${i}`).innerHTML = ""; currentAnswers[i].typedWord = ""; currentAnswers[i].typedEx = "";
        });
        document.getElementById('btn-analyze').classList.remove('hidden'); document.getElementById('btn-retry').classList.add('hidden'); document.getElementById('page-score-display').style.display = 'none';
    }

    function moveToNextTestPage() { currentChunkIdx++; renderTestPage(); }

    function finishSessionReport() {
        if (currentReviewType === 2) {
            let reqPages = parseInt(document.getElementById('part-pages').value) || 1;
            let lData = appProgress.levels[selectedLevel];
            let idxKey = currentSysMode === 'test' ? 'lastPartialIndexTest' : 'lastPartialIndexFree';
            let nextIndex = (lData[idxKey] || 0) + (reqPages * 10);
            let savedIds = lData.savedWords.filter(w => !w.isOld).map(w => w.id);
            let savedDbWords = (allLevelsData[selectedLevel] || []).filter(w => savedIds.includes(w.id));
            if(nextIndex >= savedDbWords.length) nextIndex = 0;
            lData[idxKey] = nextIndex; localStorage.setItem('appProgress', JSON.stringify(appProgress)); updateSeqInfo();
        }

        if (currentSysMode === 'free') { window.location.href = "index.html?screen=dashboard"; return; }

        let totalWAvg = 0; let html = `<h2>🏆 التقرير الاستراتيجي لنتائج الاختبار</h2>`;
        sessionFirstAttemptScores.forEach((s, idx) => { totalWAvg += s.wScore; html += `<p>• <strong>الصفحة (${idx+1}):</strong> دقة نطق الكلمات: ${Math.round(s.wScore)}%</p>`; });
        
        let finalWScore = totalWAvg / sessionFirstAttemptScores.length;
        let addedScore = (finalWScore / 100) * 10 * (testWordsChunks.length); if(isNaN(addedScore)) addedScore = 0;

        appProgress.cumulativeScore = (appProgress.cumulativeScore || 0) + addedScore; localStorage.setItem('appProgress', JSON.stringify(appProgress));

        html += `<hr><h3 style="color:var(--success);">🌟 النقاط التراكمية المضافة: +${Math.round(addedScore)} نقطة!</h3><br><button class="btn btn-back" onclick="window.location.href='index.html?screen=dashboard'">🔙 العودة</button>`;
        document.getElementById('test-area').classList.add('hidden'); const rep = document.getElementById('report-output'); rep.innerHTML = html; rep.classList.remove('hidden');
    }

    function returnToMenu() {
        if (currentSysMode === 'test' && !confirm("تنبيه: إذا عدت الآن، المحاولات غير المكتملة لن تُحتسب. متأكد؟")) return;
        window.location.href = "index.html?screen=dashboard";
    }
</script>
