<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة الكلمات المحفوظة سابقاً</title>
    <style>
        :root { --primary: #4e73df; --dark: #5a5c69; --light: #f8f9fc; --danger: #e74a3b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #e3e6f0; text-align: right; }
        th { background-color: var(--dark); color: white; }
        tr:nth-child(even) { background-color: #f8f9fc; }
        .filter-box { background: #f1f3f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-size: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>📚 سجل الكلمات والصفحات المحفوظة سابقاً لدى الطالب</h2>
        <a href="index.html?screen=dashboard" style="text-decoration: none; font-weight: bold; color: var(--danger);">🔙 العودة للوحة التحكم</a>
    </div>

    <div class="filter-box">
        <label style="font-weight: bold;">🔍 تصفية وعرض حسب الصف أو المستوى النشط فقط:</label>
        <select id="level-filter" onchange="loadSavedWordsTable()">
            <!-- يتم تعبئتها ديناميكياً بناءً على الكلمات التي تحتوي على تقدم فقط -->
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 10%;">المعرف الرقمي</th>
                <th>الكلمة باللغة الإنجليزية</th>
                <th>الترجمة بالعربية</th>
                <th>المثال والسياق التعليمي المقرون</th>
                <th>تاريخ وأوان الحفظ الموثق</th>
            </tr>
        </thead>
        <tbody id="saved-tbody">
            <!-- التوليد الديناميكي -->
        </tbody>
    </table>
</div>

<script>
    window.onload = function() {
        fillActiveLevelsFilter();
        loadSavedWordsTable();
    };

    function fillActiveLevelsFilter() {
        const select = document.getElementById('level-filter');
        select.innerHTML = "";
        
        const allLevels = [
            { id: "A1", text: "مستوى A1" }, { id: "A2", text: "مستوى A2" },
            { id: "B1", text: "مستوى B1" }, { id: "B2", text: "مستوى B2" },
            { id: "C1", text: "مستوى C1" }, { id: "C2", text: "مستوى C2" },
            { id: "CLASS1", text: "الصف الأول" }, { id: "CLASS2", text: "الصف الثاني" },
            { id: "CLASS3", text: "الصف الثالث" }, { id: "CLASS4", text: "الصف الرابع" }
        ];
        
        let appProgress = JSON.parse(localStorage.getItem('appProgress')) || { savedWords: [] };
        
        let dynamicCount = 0;
        allLevels.forEach(lvl => {
            // القائمة المنسدلة تظهر فقط المستويات والصفوف التي لدى الطالب بها تقدم وحفظ فعلي فقط
            let hasWords = appProgress.savedWords.some(w => w.level === lvl.id);
            if (hasWords || lvl.id === "A1") { 
                let opt = document.createElement('option');
                opt.value = lvl.id;
                opt.text = lvl.text;
                select.appendChild(opt);
                dynamicCount++;
            }
        });
    }

    function loadSavedWordsTable() {
        const tbody = document.getElementById('saved-tbody');
        tbody.innerHTML = "";
        
        let appProgress = JSON.parse(localStorage.getItem('appProgress')) || { savedWords: [] };
        let selectedFilter = document.getElementById('level-filter').value;
        
        let filteredWords = appProgress.savedWords.filter(w => w.level === selectedFilter);
        
        if (filteredWords.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #666; font-style: italic;">🔭 لا يوجد أي كلمات محفوظة متوفرة في هذا المستوى المختار حتى الآن.</td></tr>`;
            return;
        }

        filteredWords.forEach(word => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><b>${word.id}</b></td>
                <td style="color: #4e73df; font-weight: bold;">${word.en}</td>
                <td>${word.ar}</td>
                <td><small><b>${word.ex_en || ''}</b> <br> <span style="color:#666;">${word.ar_ex || ''}</span></small></td>
                <td style="color: #1cc88a; font-size: 13px;">${word.date || 'غير محدد'}</td>
            `;
            tbody.appendChild(row);
        });
    }
</script>
</body>
</html>
