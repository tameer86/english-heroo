<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الكلمات المحفوظة سابقا للطلاب</title>
    <style>
        :root { --primary: #4e73df; --success: #1cc88a; --light: #f8f9fc; }
        body { font-family: sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #e3e6f0; padding: 12px; text-align: center; }
        th { background: var(--primary); color: white; }
        select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; min-width: 200px; }
    </style>
</head>
<body>

<div class="card">
    <a href="index.html?screen=dashboard" style="text-decoration: none; font-weight: bold; color: var(--primary);">🔙 العودة للوحة التحكم الرئيسية</a>
    
    <h2>📚 سجل وحصيلة الكلمات والصفوف المحفوظة سابقاً</h2>
    <p>تعرض هذه الشاشة فقط الصفوف والمستويات التي أنجزت بها تقدماً علمياً فعلياً وحفظاً حتى الآن.</p>

    <div style="margin: 20px 0;">
        <label style="font-weight: bold; margin-left: 10px;">تصفية حسب الصف اللغوي المنجز:</label>
        <!-- القائمة المنسدلة تظهر فقط المستويات المنجزة فعلياً للطالب مع مسميات عربية صحيحة (الخيارات 16، 19) -->
        <select id="memorized-level-dropdown" onchange="renderMemorizedTable()">
            <!-- تتولد ديناميكياً برمجياً -->
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>الرقم التعريفي</th>
                <th>الكلمة بالإنجليزية</th>
                <th>الترجمة بالعربية</th>
                <th>تاريخ الحفظ والتدريب</th>
            </tr>
        </thead>
        <tbody id="memorized-table-body">
            <!-- صفوف الكلمات المنجزة سابقا -->
        </tbody>
    </table>
</div>

<script>
    let savedWordsLog = [];

    function loadSavedLog() {
        let stored = localStorage.getItem('appProgress');
        let progress = stored ? JSON.parse(stored) : { savedWords: [] };
        savedWordsLog = progress.savedWords || [];

        // محاكاة لضمان الملء التلقائي لأول مرة للاختبار الفوري والدقيق للمرحلة الخامسة
        if(savedWordsLog.length === 0) {
            savedWordsLog = [
                { id: 1, en: "School", ar: "مدرسة", level: "A1", date: "٢٠٢٦/٦/٢١" },
                { id: 2, en: "Teacher", ar: "معلم", level: "CLASS1", date: "٢٠٢٦/٦/٢١" }
            ];
        }

        buildFilterDropdown(savedWordsLog);
        renderMemorizedTable();
    }

    function buildFilterDropdown(words) {
        const select = document.getElementById('memorized-level-dropdown');
        select.innerHTML = "";

        let uniqueLevels = [...new Set(words.map(w => w.level))];
        const labelMap = {
            "A1": "مستوى A1", "A2": "مستوى A2", "B1": "مستوى B1", "B2": "مستوى B2", "C1": "مستوى C1", "C2": "مستوى C2",
            "CLASS1": "الصف الأول", "CLASS2": "الصف الثاني", "CLASS3": "الصف الثالث"
        };

        uniqueLevels.forEach(lvl => {
            let opt = document.createElement('option');
            opt.value = lvl;
            opt.text = labelMap[lvl] || lvl;
            select.appendChild(opt);
        });
    }

    function renderMemorizedTable() {
        const tbody = document.getElementById('memorized-table-body');
        tbody.innerHTML = "";

        let selectedLvl = document.getElementById('memorized-level-dropdown').value;
        let matchedWords = savedWordsLog.filter(w => w.level === selectedLvl);

        if(matchedWords.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="color:#858796;">ℹ️ لا توجد كلمات منجزة محفوظة تحت هذا التصنيف حالياً.</td></tr>`;
            return;
        }

        matchedWords.forEach(word => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${word.id}</td>
                <td style="font-weight:bold; color:var(--primary);">${word.en}</td>
                <td>${word.ar}</td>
                <td><span style="background:#e8f5e9; color:#2e7d32; padding:4px 8px; border-radius:4px; font-size:13px;">${word.date}</span></td>
            `;
            tbody.appendChild(row);
        });
    }

    window.onload = loadSavedLog;
</script>
</body>
</html>
