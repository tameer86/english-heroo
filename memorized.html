<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الكلمات المخزنة والمحفوظة</title>
    <style>
        body { font-family: sans-serif; background: #eef2f7; padding: 20px; text-align: center; }
        .header-box { background: #1cc88a; color: white; padding: 20px; border-radius: 10px; max-width: 800px; margin: 0 auto 20px auto; font-size: 20px; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        table { width: 100%; max-width: 800px; margin: 0 auto; border-collapse: collapse; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 15px; text-align: center; }
        thead { background: #4e73df; color: white; }
        button { background: #5a5c69; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 10px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-box">
        إجمالي الكلمات التي حفظتها وتجاوزتها بنجاح: <span id="total-saved">0</span> كلمة 🏆
    </div>

    <table>
        <thead>
            <tr>
                <th>الرقم</th>
                <th>الكلمة الإنجليزية</th>
                <th>المعنى بالعربية</th>
                <th>تاريخ وجلسة الحفظ</th>
            </tr>
        </thead>
        <tbody id="saved-body"></tbody>
    </table>

    <button onclick="window.location.href='index.html?screen=dashboard'">🔙 العودة للوحة التحكم</button>

    <script>
        window.onload = function() {
            let appProgress = JSON.parse(localStorage.getItem('appProgress'));
            let savedWords = appProgress ? appProgress.savedWords : [];
            document.getElementById('total-saved').innerText = savedWords.length;
            
            const tbody = document.getElementById('saved-body');
            if(savedWords.length === 0) {
                tbody.innerHTML = "<tr><td colspan='4'>لم تبدأ بحفظ الكلمات بعد. ابدأ رحلتك التعليمية الآن!</td></tr>";
                return;
            }

            savedWords.forEach((word, index) => {
                let row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td style="font-weight:bold; color:#4e73df; font-size:18px;">${word.en}</td>
                    <td style="font-weight:bold;">${word.ar}</td>
                    <td style="color:#e74a3b; font-weight:bold;">${word.date}</td>
                `;
                tbody.appendChild(row);
            });
        }
    </script>
</body>
</html>
