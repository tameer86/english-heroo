<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة الألعاب التعليمية</title>
    <style>
        :root {
            --primary: #3498db;
            --purple: #8e44ad;
            --danger: #e74a3b;
            --success: #1cc88a;
            --dark: #5a5c69;
            --light: #f8f9fc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .subtitle { color: var(--dark); font-size: 16px; margin-bottom: 30px; }
        
        .games-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .game-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 22px 45px;
            font-size: 24px;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: transform 0.2s, background-color 0.2s, opacity 0.3s;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
        }
        .game-btn:hover {
            transform: translateY(-5px);
            opacity: 0.95;
        }
        
        /* تصميم الزر المعطل */
        .game-btn.disabled {
            background-color: #cbd5e1 !important;
            color: #94a3b8 !important;
            cursor: not-allowed !important;
            box-shadow: none !important;
            transform: none !important;
        }

        /* زر فتح الإعدادات (المسنن) */
        .btn-settings-toggle {
            background-color: white;
            color: var(--dark);
            border: 2px solid #ddd;
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 50px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        .btn-settings-toggle:hover {
            background-color: #f8f9fc;
            border-color: #ccc;
        }

        /* لوحة التحكم والإعدادات لولي الأمر */
        .admin-panel {
            display: none; /* مخفية بشكل افتراضي */
            margin-top: 20px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #e3e6f0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: none; /* مخفية بشكل افتراضي */
            max-width: 500px;
            width: 100%;
            text-align: right;
            position: relative;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* زر الإغلاق داخل اللوحة */
        .close-panel-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            font-size: 20px;
            color: var(--danger);
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .close-panel-btn:hover {
            transform: scale(1.2);
        }

        .admin-panel h3 {
            margin-top: 0;
            color: var(--dark);
            border-bottom: 2px solid #eaecf4;
            padding-bottom: 10px;
            text-align: center;
            padding-right: 20px; /* لترك مساحة لزر الإغلاق */
        }
        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 5px;
            border-bottom: 1px dashed #eaecf4;
        }
        .control-row label {
            font-size: 17px;
            font-weight: bold;
            color: #4e73df;
            cursor: pointer;
        }
        .control-row input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
        }
        
        .password-section {
            margin-top: 20px;
            background: #f8f9fc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #dddfeb;
        }
        .password-section label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--danger);
        }
        .password-section input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            text-align: left;
            direction: ltr;
        }
        
        .btn-reset-all {
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: opacity 0.2s;
        }
        .btn-reset-all:hover { opacity: 0.9; }

        .btn-back {
            background-color: var(--dark);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            text-decoration: none;
            display: inline-block;
            transition: opacity 0.2s;
        }
        .btn-back:hover { opacity: 0.9; }

        .bottom-controls {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
    </style>
</head>
<body>

    <h1>🎮 مرحباً بك في قسم الألعاب 🎮</h1>
    <p class="subtitle">اختر اللعبة التي تريد أن تلعبها لتبدأ التحدي وتجمع النقاط!</p>

    <div class="games-container">
        <div class="game-card">
            <a href="matchg.html" id="link-matchg" class="game-btn">لعبة المطابقة والذاكرة 🎴</a>
        </div>
        <div class="game-card">
            <a href="listen.html" id="link-listen" class="game-btn" style="background-color: var(--purple);">لعبة صائد الكلمات المسموعة 🎧</a>
        </div>
    </div>

    <div class="bottom-controls">
        <button class="btn-settings-toggle" onclick="toggleAdminPanel()">⚙️ إعدادات ولي الأمر</button>

        <div class="admin-panel" id="admin-panel">
            <button class="close-panel-btn" onclick="toggleAdminPanel()" title="إغلاق">✖</button>
            <h3>⚙️ إعدادات الألعاب (لولي الأمر)</h3>
            
            <div class="control-row">
                <label for="check-matchg">تفعيل لعبة المطابقة والذاكرة</label>
                <input type="checkbox" id="check-matchg" checked onchange="toggleGameActivation('matchg', this)">
            </div>
            
            <div class="control-row">
                <label for="check-listen">تفعيل لعبة صائد الأمثلة المسموعة</label>
                <input type="checkbox" id="check-listen" checked onchange="toggleGameActivation('listen', this)">
            </div>

            <div class="password-section">
                <label>كلمة المرور لتأكيد التغييرات أو التصفير:</label>
                <input type="password" id="admin-password" placeholder="أدخل كلمة المرور لتفعيل الإجراء">
                
                <button class="btn-reset-all" onclick="resetAllGamesProgress()">🔄 تصفير مراحل جميع الألعاب</button>
            </div>
        </div>

        <button class="btn-back" onclick="window.location.href='index.html?screen=dashboard'">🔙 العودة للوحة التحكم</button>
    </div>

    <script>
        // تعريف كلمة المرور الافتراضية للتطبيق بناء على طلبك
        const ADMIN_PASSWORD = "T@mer2023";

        // كائن يحفظ الإعدادات الافتراضية للألعاب وتفعيلها
        let gameStatus = JSON.parse(localStorage.getItem('gameActivationSettings')) || {
            matchg: true,
            listen: true
        };

        window.onload = function() {
            // مزامنة واجهة المستخدم بناءً على الإعدادات المخزنة في المتصفح
            document.getElementById('check-matchg').checked = gameStatus.matchg;
            document.getElementById('check-listen').checked = gameStatus.listen;
            
            applyUIChanges();
        };

        // دالة لفتح وإغلاق لوحة الإعدادات
        function toggleAdminPanel() {
            const panel = document.getElementById('admin-panel');
            if (panel.style.display === 'none' || panel.style.display === '') {
                panel.style.display = 'inline-block';
                // تمرير الشاشة للأسفل بسلاسة لتظهر اللوحة
                setTimeout(() => panel.scrollIntoView({ behavior: 'smooth' }), 100);
            } else {
                panel.style.display = 'none';
            }
        }

        // دالة تطبيق التغييرات على الأزرار (تفعيل/تعطيل بصري وروابط)
        function applyUIChanges() {
            const btnMatch = document.getElementById('link-matchg');
            const btnListen = document.getElementById('link-listen');

            // إعدادات لعبة المطابقة
            if (gameStatus.matchg) {
                btnMatch.classList.remove('disabled');
                btnMatch.setAttribute('href', 'matchg.html');
                btnMatch.onclick = null;
            } else {
                btnMatch.classList.add('disabled');
                btnMatch.removeAttribute('href');
                btnMatch.onclick = function(e) { 
                    e.preventDefault(); 
                    alert('عذراً يا بطل، هذه اللعبة مغلقة حالياً من قبل ولي الأمر! 🔒'); 
                    return false; 
                };
            }

            // إعدادات لعبة السمع
            if (gameStatus.listen) {
                btnListen.classList.remove('disabled');
                btnListen.setAttribute('href', 'listen.html');
                btnListen.onclick = null;
            } else {
                btnListen.classList.add('disabled');
                btnListen.removeAttribute('href');
                btnListen.onclick = function(e) { 
                    e.preventDefault(); 
                    alert('عذراً يا بطل، هذه اللعبة مغلقة حالياً من قبل ولي الأمر! 🔒'); 
                    return false; 
                };
            }
        }

        // دالة تغيير التفعيل عند الضغط على الـ Checkbox (مرتبطة بكلمة المرور)
        function toggleGameActivation(gameKey, checkboxElement) {
            const passInput = document.getElementById('admin-password').value;

            if (passInput === ADMIN_PASSWORD) {
                gameStatus[gameKey] = checkboxElement.checked;
                localStorage.setItem('gameActivationSettings', JSON.stringify(gameStatus));
                applyUIChanges();
                document.getElementById('admin-password').value = ''; // تصفير حقل كلمة المرور بعد النجاح
                alert('تم تعديل حالة تفعيل اللعبة بنجاح. ✔️');
            } else {
                alert('خطأ: كلمة المرور غير صحيحة! لا يمكنك تغيير إعدادات اللعبة بدونها.');
                // إعادة صندوق الاختيار لحالته السابقة لعدم مطابقة كلمة المرور
                checkboxElement.checked = !checkboxElement.checked;
            }
        }

        // دالة تصفير مراحل جميع الألعاب دفعة واحدة (مرتبطة بكلمة المرور)
        function resetAllGamesProgress() {
            const passInput = document.getElementById('admin-password').value;

            if (passInput === ADMIN_PASSWORD) {
                if (confirm('⚠️ تحذير لولي الأمر: هل أنت متأكد من تصفير كافة النجوم والمراحل لجميع الألعاب؟ سيبدأ الطفل من المرحلة الأولى مجدداً.')) {
                    
                    // تصفير ملف لعبة الذاكرة والمطابقة
                    let matchProg = JSON.parse(localStorage.getItem('matchGameProgress')) || {};
                    for (let lvl in matchProg) {
                        matchProg[lvl] = { 1: { unlocked: true, stars: 0, time: 0 } };
                    }
                    localStorage.setItem('matchGameProgress', JSON.stringify(matchProg));

                    // تصفير ملف لعبة صائد الكلمات المسموعة
                    let listenProg = JSON.parse(localStorage.getItem('listenGameProgress')) || {};
                    for (let lvl in listenProg) {
                        listenProg[lvl] = { 1: { unlocked: true, stars: 0, time: 0 } };
                    }
                    localStorage.setItem('listenGameProgress', JSON.stringify(listenProg));

                    document.getElementById('admin-password').value = ''; // تفريغ الحقل
                    alert('تم تصفير تقدم المراحل والنجوم لجميع الألعاب بنجاح تام! 🔄');
                }
            } else {
                alert('خطأ: كلمة المرور غير صحيحة! لا يمكنك تصفير مراحل الألعاب.');
            }
        }
    </script>
</body>
</html>
