<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة الألعاب التعليمية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            padding: 50px;
        }
        h1 { color: #2c3e50; }
        .games-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }
        .game-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s, background-color 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .game-btn:hover {
            background-color: #2980b9;
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <h1>🎮 مرحباً بك في قسم الألعاب 🎮</h1>
    <p>اختر اللعبة التي تريد أن تلعبها لتبدأ التحدي وتجمع النقاط!</p>

    <div class="games-container">
        <a href="matchg.html" class="game-btn">لعبة المطابقة والذاكرة 🎴</a>
    </div>

</body>
</html>
