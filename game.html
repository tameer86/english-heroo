<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة الألعاب التعليمية</title>
    <style>
        :root {
            --primary: #3498db;
            --purple: #8e44ad;
            --danger: #e74a3b;
            --success: #1cc88a;
            --dark: #5a5c69;
            --light: #f8f9fc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .subtitle { color: var(--dark); font-size: 16px; margin-bottom: 30px; }
        
        .games-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .game-btn {
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: transform 0.2s, background-color 0.2s;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
        }
        .game-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* زر الإعدادات المسنن */
        .btn-settings-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.3s;
            user-select: none;
        }
        .btn-settings-toggle:hover {
            transform: rotate(45deg);
        }

        /* لوحة الإعدادات المخفية */
        .admin-panel {
            display: none;
            max-width: 500px;
            margin: 25px auto 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
            text-align: right;
        }
        .admin-panel h3 { margin-top: 0; color: var(--dark); border-bottom: 2px solid #eee; padding-bottom: 8px; text-align: center; }
        .admin-row { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .admin-row label { font-weight: bold; color: var(--dark); }
        .admin-row input { padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; font-weight: bold; }
        
        .admin-checkbox-group { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; background: var(--light); padding: 12px; border-radius: 6px; }
        .admin-checkbox-group label { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 15px; }
        .admin-checkbox-group input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

        .btn-admin-action {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            background-color: var(--danger);
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        .btn-admin-action:hover { opacity: 0.9; }

        .btn-back {
            background-color: var(--dark);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 40px;
            text-decoration: none;
            display: inline-block;
            transition: opacity 0.2s;
        }
        .btn-back:hover { opacity: 0.9; }

        /* تنسيق الصورة المتجاوبة والنسبية */
        .game-image {
            margin-top: 35px;
            width: clamp(240px, 42vw, 480px);
            height: auto;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <button class="btn-settings-toggle" onclick="toggleAdminPanel()" title="إعدادات الألعاب لولي الأمر">⚙️</button>

    <h1>🎮 مرحباً بك في قسم الألعاب 🎮</h1>
    <p class="subtitle">اختر اللعبة التي تريد أن تلعبها لتبدأ التحدي وتجمع النقاط!</p>

    <div class="games-container">
        <a href="matchg.html" id="link-matchg" class="game-btn" style="background-color: var(--primary);">لعبة المطابقة والذاكرة 🎴</a>
        <a href="listen.html" id="link-listen" class="game-btn" style="background-color: var(--purple);">لعبة صائد الأمثلة المسموعة 🎧</a>
    </div>

    <div id="admin-panel" class="admin-panel">
        <h3>⚙️ إعدادات التحكم بالألعاب (لولي الأمر)</h3>
        
        <div class="admin-checkbox-group">
            <strong style="color: var(--dark); margin-bottom: 5px; display: block;">تفعيل أو تعطيل الألعاب للطفل:</strong>
            <label>
                <input type="checkbox" id="chk-matchg" checked onchange="updateGamesState()"> تفعيل لعبة المطابقة والذاكرة
            </label>
            <label>
                <input type="checkbox" id="chk-listen" checked onchange="updateGamesState()"> تفعيل لعبة صائد الأمثلة المسموعة
            </label>
        </div>

        <div class="admin-row" style="margin-top: 20px;">
            <label>تصفير مراحل جميع الألعاب للبدء من جديد:</label>
            <input type="password" id="admin-password" placeholder="أدخل كلمة المرور للتأكيد">
        </div>
        <button class="btn-admin-action" onclick="resetAllGamesProgress()">🔄 تصفير النجوم والمراحل للكل</button>
    </div>

    <div>
        <img src="mon.jpeg" alt="صورة تحفيزية للألعاب" class="game-image">
    </div>

    <br>
    <button class="btn-back" onclick="window.location.href='index.html?screen=dashboard'">🔙 العودة للوحة التحكم</button>

<script>
    const ADMIN_PASSWORD = 'T@mer2023';

    window.onload = function() {
        loadGamesState();
    };

    function toggleAdminPanel() {
        const panel = document.getElementById('admin-panel');
        if (panel.style.display === 'block') {
            panel.style.display = 'none';
        } else {
            panel.style.display = 'block';
        }
    }

    // حفظ حالة تفعيل/تعطيل الألعاب في الـ localStorage
    function updateGamesState() {
        const matchgActive = document.getElementById('chk-matchg').checked;
        const listenActive = document.getElementById('chk-listen').checked;

        const gameState = { matchg: matchgActive, listen: listenActive };
        localStorage.setItem('disabledGamesConfig', JSON.stringify(gameState));
        
        applyGamesState(gameState);
    }

    function loadGamesState() {
        const savedState = JSON.parse(localStorage.getItem('disabledGamesConfig')) || { matchg: true, listen: true };
        
        document.getElementById('chk-matchg').checked = savedState.matchg;
        document.getElementById('chk-listen').checked = savedState.listen;
        
        applyGamesState(savedState);
    }

    // تطبيق التعطيل (تعتيم الكبسة وإلغاء الرابط)
    function applyGamesState(state) {
        const btnMatch = document.getElementById('link-matchg');
        const btnListen = document.getElementById('link-listen');

        // لعبة الذاكرة
        if (state.matchg) {
            btnMatch.style.opacity = '1';
            btnMatch.style.pointerEvents = 'auto';
            btnMatch.setAttribute('href', 'matchg.html');
        } else {
            btnMatch.style.opacity = '0.35';
            btnMatch.style.pointerEvents = 'none';
            btnMatch.removeAttribute('href');
        }

        // لعبة الاستماع
        if (state.listen) {
            btnListen.style.opacity = '1';
            btnListen.style.pointerEvents = 'auto';
            btnListen.setAttribute('href', 'listen.html');
        } else {
            btnListen.style.opacity = '0.35';
            btnListen.style.pointerEvents = 'none';
            btnListen.removeAttribute('href');
        }
    }

    // تصفير تقدم الألعاب بالكامل بناءً على كلمة المرور
    function resetAllGamesProgress() {
        const passInput = document.getElementById('admin-password').value;

        if (passInput === ADMIN_PASSWORD) {
            if (confirm('⚠️ تحذير لولي الأمر: هل أنت متأكد من تصفير كافة النجوم والمراحل لجميع الألعاب؟ سيبدأ الطفل من المرحلة الأولى مجدداً.')) {
                
                // تصفير لعبة الذاكرة والمطابقة
                let matchProg = JSON.parse(localStorage.getItem('matchGameProgress')) || {};
                for (let lvl in matchProg) {
                    matchProg[lvl] = { 1: { unlocked: true, stars: 0, time: 0 } };
                }
                localStorage.setItem('matchGameProgress', JSON.stringify(matchProg));

                // تصفير لعبة صائد الأمثلة المسموعة
                let listenProg = JSON.parse(localStorage.getItem('listenGameProgress')) || {};
                for (let lvl in listenProg) {
                    listenProg[lvl] = { 1: { unlocked: true, stars: 0, time: 0 } };
                }
                localStorage.setItem('listenGameProgress', JSON.stringify(listenProg));

                document.getElementById('admin-password').value = ''; 
                alert('تم تصفير تقدم المراحل والنجوم لجميع الألعاب بنجاح تام! 🔄');
                toggleAdminPanel();
            }
        } else {
            alert('خطأ: كلمة المرور غير صحيحة! لا يمكنك تصفير مراحل الألعاب.');
        }
    }
</script>

</body>
</html>
